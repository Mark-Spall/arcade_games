<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZONE COLLAPSE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #020108;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }
  
  #cab {
    position: relative;
    border: 4px solid #111;
    border-radius: 8px;
    box-shadow: 
      0 0 50px rgba(255, 0, 80, 0.2),
      0 0 100px rgba(0, 255, 200, 0.1),
      inset 0 0 40px rgba(0, 0, 0, 0.9);
    background: #050505;
    padding: 8px;
  }
  
  #cv {
    display: block;
    border-radius: 4px;
    background: #110000; /* Reddish base for the storm */
  }
  
  #crt {
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 10;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.15) 0px,
      rgba(0, 0, 0, 0.15) 1px,
      transparent 1px,
      transparent 2px
    );
  }
  
  #crt::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 4px;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(20, 0, 0, 0.6) 100%);
  }

  #touch {
    display: none;
    position: fixed;
    left: 0; right: 0;
    bottom: max(8px, env(safe-area-inset-bottom));
    padding: 0 12px calc(6px + env(safe-area-inset-bottom));
    z-index: 100;
    justify-content: space-between;
    align-items: flex-end;
  }
  .tp { display: flex; gap: 8px; align-items: center; }
  .tb {
    background: rgba(0, 255, 255, 0.10);
    border: 2px solid rgba(0, 255, 255, 0.28);
    color: rgba(0, 255, 255, 0.95);
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    width: 56px; height: 56px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }
  .tb:active { background: rgba(255, 0, 60, 0.16); border-color: rgba(255, 0, 60, 0.4); }
  .tb.sm { width: 48px; height: 48px; font-size: 10px; }

  /* Prefer showing controls based on input type, not only width (many phones report wide CSS px). */
  @media (pointer: coarse), (hover: none) {
    #touch { display: flex; }
    body { padding-bottom: 86px; }
  }

  @media (max-width: 560px) {
    #cab { border-width: 2px; padding: 3px; border-radius: 6px; }
    #crt { top: 3px; left: 3px; right: 3px; bottom: 3px; }
    #touch { display: flex; }
    body { padding-bottom: 86px; }
  }
</style>
</head>
<body>

<div id="cab">
  <canvas id="cv" width="400" height="500"></canvas>
  <div id="crt"></div>
</div>

<div id="touch">
  <div class="tp">
    <button class="tb" id="t-left" aria-label="Rotate left">◀</button>
    <button class="tb" id="t-right" aria-label="Rotate right">▶</button>
  </div>
  <div class="tp">
    <button class="tb sm" id="t-thrust" aria-label="Thrust">▲</button>
    <button class="tb" id="t-fire" aria-label="Fire">●</button>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// --- Leaderboard submission (global + offline cache via /scores.js) ---
const GAME_ID = 'neon-zone-collapse';
const TOTAL_PLAYERS = 10; // You + 9 bots
let arcadeScoreSubmitted = false;
let lastPlaced = null;
let lastElims = null;
let lastScore = null;

function queueZoneCollapseScore({ placed, elims, score }) {
  if (arcadeScoreSubmitted) return;
  arcadeScoreSubmitted = true;

  const p = Math.max(1, Math.floor(Number(placed) || TOTAL_PLAYERS));
  const e = Math.max(0, Math.min(TOTAL_PLAYERS - 1, Math.floor(Number(elims) || 0)));
  const s = Math.max(0, Math.floor(Number(score) || 0));
  lastPlaced = p;
  lastElims = e;
  lastScore = s;

  setTimeout(() => {
    import('/scores.js')
      .then(({ submitScore }) => {
        const raw = prompt('HIGH SCORE — Enter initials (max 12):', 'AAA');
        const name = raw == null ? 'AAA' : raw.trim() || 'AAA';
        submitScore({ gameId: GAME_ID, name, score: s, limit: 10 });
      })
      .catch(() => {});
  }, 0);
}

// --- Aesthetics ---
const C_SAFE = '#0a0a1a';
const C_ZONE = '#ff003c';
const C_PLY = '#00ffff';
const C_BOT = '#ff00ff';
const C_BUL = '#ffff00';
const C_LOOT = '#39ff14';
const C_STAR = 'rgba(200,220,255,0.12)';

// --- Helpers ---
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function rand(a, b) { return a + Math.random() * (b - a); }

// --- Game State ---
let state = 'TITLE'; // TITLE, PLAY, OVER, WIN
let frames = 0;
let zoneRadius = 350;

// Player is an Asteroids-style ship (rotate + thrust + inertia)
let p = null;
let score = 0;
let elims = 0;
let startedAt = 0;
let keys = Object.create(null);
let pointer = { active: false, x: 200, y: 250 };

let bots = [];
let bullets = [];
let loot = [];
let particles = [];
let stars = [];
let lootSpawnCd = 0;

// --- Input Handling ---
window.addEventListener('keydown', (e) => { keys[e.key] = 1; });
window.addEventListener('keyup', (e) => { keys[e.key] = 0; });

const ts = Object.create(null);
function addT(id, key) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', (e) => { e.preventDefault(); ts[key] = 1; });
  el.addEventListener('touchend', (e) => { e.preventDefault(); ts[key] = 0; });
  el.addEventListener('touchcancel', (e) => { e.preventDefault(); ts[key] = 0; });
}
addT('t-left', 'left'); addT('t-right', 'right');
addT('t-thrust', 'thrust'); addT('t-fire', 'fire');

function handlePointer(e) {
  e.preventDefault();
  if (state !== 'PLAY' && (e.type === 'mousedown' || e.type === 'touchstart')) { 
    initGame(); return; 
  }
  let rect = cv.getBoundingClientRect();
  let touch = e.touches ? e.touches[0] : e;
  if(touch) {
    pointer.x = (touch.clientX - rect.left) * (cv.width / rect.width);
    pointer.y = (touch.clientY - rect.top) * (cv.height / rect.height);
  }
  pointer.active = e.type !== 'mouseup' && e.type !== 'touchend';
}
cv.addEventListener('mousedown', handlePointer);
cv.addEventListener('mousemove', e => { if(pointer.active) handlePointer(e); });
window.addEventListener('mouseup', handlePointer);
cv.addEventListener('touchstart', handlePointer, {passive: false});
cv.addEventListener('touchmove', handlePointer, {passive: false});
window.addEventListener('touchend', handlePointer);

function K(k) {
  if (k === 'left') return keys['ArrowLeft'] || keys['a'] || ts.left;
  if (k === 'right') return keys['ArrowRight'] || keys['d'] || ts.right;
  if (k === 'thrust') return keys['ArrowUp'] || keys['w'] || ts.thrust;
  if (k === 'fire') return keys[' '] || keys['z'] || keys['Z'] || ts.fire;
  return 0;
}

function initGame() {
  score = 0;
  elims = 0;
  startedAt = performance.now();
  p = {
    x: 200, y: 250,
    vx: 0, vy: 0,
    ang: -Math.PI / 2,
    hp: 100, maxHp: 100,
    turn: 0.075,
    thrust: 0.16,
    drag: 0.992,
    fireCd: 0,
    invuln: 80,
    weapon: 'single', // single, triple, pierce, rapid
    weaponT: 0,
    shield: 0, // hits remaining
    boostT: 0,
  };
  zoneRadius = 350;
  frames = 0;
  bots = []; bullets = []; loot = []; particles = [];
  arcadeScoreSubmitted = false;
  lastPlaced = null;
  lastElims = null;
  lastScore = null;

  // Stars for space vibe
  stars = [];
  for (let i = 0; i < 90; i++) stars.push({ x: Math.random() * cv.width, y: Math.random() * cv.height, r: Math.random() * 1.6 + 0.2, s: Math.random() * 0.35 + 0.05 });
  lootSpawnCd = 120;
  
  // Spawn 9 Bots
  for(let i=0; i<9; i++) {
    let bx = Math.random() * cv.width;
    let by = Math.random() * cv.height;
    // Don't spawn too close to player
    if (Math.hypot(by - p.y, bx - p.x) < 100) bx += 100;
    bots.push({
      x: bx, y: by,
      vx: rand(-0.6, 0.6), vy: rand(-0.6, 0.6),
      ang: Math.random() * Math.PI * 2,
      hp: 55,
      turn: 0.05 + Math.random() * 0.03,
      thrust: 0.10 + Math.random() * 0.07,
      drag: 0.993,
      reload: 30 + Math.random() * 40,
      persona: Math.random() < 0.25 ? 'SNIPER' : (Math.random() < 0.55 ? 'HUNTER' : 'COWARD'),
      state: 'WANDER',
      tx: bx, ty: by,
    });
  }
  
  // Spawn initial loot
  for(let i=0; i<3; i++) {
    loot.push(spawnLoot());
  }
  
  state = 'PLAY';
}

function spawnLoot() {
  const r = Math.random();
  let type = 'REPAIR';
  if (r < 0.18) type = 'SHIELD';
  else if (r < 0.38) type = 'TRIPLE';
  else if (r < 0.53) type = 'RAPID';
  else if (r < 0.66) type = 'PIERCE';
  else if (r < 0.78) type = 'BOOST';
  else type = 'REPAIR';
  return { x: 40 + Math.random()*(cv.width-80), y: 40 + Math.random()*(cv.height-80), type };
}

function applyLoot(l) {
  if (!p) return;
  if (l.type === 'REPAIR') {
    p.hp = Math.min(p.maxHp, p.hp + 15);
  } else if (l.type === 'SHIELD') {
    p.shield = Math.min(3, p.shield + 1);
  } else if (l.type === 'BOOST') {
    p.boostT = Math.min(420, p.boostT + 240);
  } else if (l.type === 'TRIPLE') {
    p.weapon = 'triple'; p.weaponT = 520;
  } else if (l.type === 'RAPID') {
    p.weapon = 'rapid'; p.weaponT = 420;
  } else if (l.type === 'PIERCE') {
    p.weapon = 'pierce'; p.weaponT = 520;
  }
}

function spawnParticle(x, y, color, count, speed=3) {
  for(let i=0; i<count; i++) {
    particles.push({
      x, y, 
      vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed,
      life: 15 + Math.random()*15,
      color
    });
  }
}

function getNearestTarget(entity, targets) {
  let nearest = null;
  let minDist = Infinity;
  for (let t of targets) {
    let dist = Math.hypot(t.y - entity.y, t.x - entity.x);
    if (dist < minDist) { minDist = dist; nearest = t; }
  }
  return { target: nearest, dist: minDist };
}

// --- Game Loop ---
function update() {
  if (state !== 'PLAY') {
    if ((keys.w || keys.ArrowUp) && (state === 'OVER' || state === 'WIN')) initGame();
    return;
  }
  
  frames++;

  // Live score (arcade-y): kills are king, time matters, win bonus at the end.
  const survivalSeconds = Math.floor((performance.now() - startedAt) / 1000);
  score = elims * 1000 + survivalSeconds * 10;

  // 1. Shrink Zone
  const t = frames / 60;
  const shrink = zoneRadius > 95 ? 0.12 : (zoneRadius > 55 ? 0.18 : 0.28);
  if (frames % 2 === 0 && zoneRadius > 18) zoneRadius -= shrink;

  // 2. Player Ship (rotate/thrust/inertia)
  if (p.invuln > 0) p.invuln--;
  if (p.weaponT > 0) {
    p.weaponT--;
    if (p.weaponT <= 0) p.weapon = 'single';
  }
  if (p.boostT > 0) p.boostT--;

  const turn = p.turn * (p.boostT > 0 ? 1.18 : 1.0);
  const thrust = p.thrust * (p.boostT > 0 ? 1.25 : 1.0);

  if (pointer.active) {
    const aim = Math.atan2(pointer.y - p.y, pointer.x - p.x);
    let da = ((aim - p.ang + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
    p.ang += clamp(da, -turn, turn);
    p.vx += Math.cos(p.ang) * thrust;
    p.vy += Math.sin(p.ang) * thrust;
  } else {
    if (K('left')) p.ang -= turn;
    if (K('right')) p.ang += turn;
    if (K('thrust')) {
      p.vx += Math.cos(p.ang) * thrust;
      p.vy += Math.sin(p.ang) * thrust;
      if (frames % 6 === 0) spawnParticle(p.x - Math.cos(p.ang) * 10, p.y - Math.sin(p.ang) * 10, C_PLY, 1, 1.2);
    }
  }

  p.vx *= p.drag;
  p.vy *= p.drag;
  p.x += p.vx;
  p.y += p.vy;
  p.x = clamp(p.x, 10, cv.width - 10);
  p.y = clamp(p.y, 10, cv.height - 10);

  // Player Zone Damage
  let distToCenter = Math.hypot(p.y - cv.height/2, p.x - cv.width/2);
  if (distToCenter > zoneRadius) {
    const zd = zoneRadius > 85 ? 0.55 : (zoneRadius > 55 ? 0.8 : 1.15);
    p.hp -= zd;
    if (frames % 10 === 0) spawnParticle(p.x, p.y, C_ZONE, 1);
  }

  // Player Manual Fire (Space/Z)
  p.fireCd--;
  if (K('fire') && p.fireCd <= 0) {
    const baseSpd = 8.5;
    const spread = 0.22;
    const dmgBase = 16;
    const life = 80;
    const shoot = (ang, spd, dmg, pierce) => {
      bullets.push({
        x: p.x + Math.cos(ang) * 12,
        y: p.y + Math.sin(ang) * 12,
        vx: Math.cos(ang) * spd + p.vx * 0.35,
        vy: Math.sin(ang) * spd + p.vy * 0.35,
        isPlayer: true,
        dmg,
        life,
        pierce: !!pierce,
      });
    };

    if (p.weapon === 'triple') {
      shoot(p.ang, baseSpd, dmgBase * 0.85, false);
      shoot(p.ang - spread, baseSpd, dmgBase * 0.75, false);
      shoot(p.ang + spread, baseSpd, dmgBase * 0.75, false);
      p.fireCd = 14;
    } else if (p.weapon === 'rapid') {
      shoot(p.ang + rand(-0.06, 0.06), baseSpd, dmgBase * 0.7, false);
      p.fireCd = 7;
    } else if (p.weapon === 'pierce') {
      shoot(p.ang, baseSpd * 1.05, dmgBase * 0.9, true);
      p.fireCd = 12;
    } else {
      shoot(p.ang, baseSpd, dmgBase, false);
      p.fireCd = 11;
    }

    spawnParticle(p.x + Math.cos(p.ang) * 10, p.y + Math.sin(p.ang) * 10, C_BUL, 4, 1.2);
  }

  // 3. Collect Loot
  for (let i = loot.length - 1; i >= 0; i--) {
    let l = loot[i];
    if (Math.hypot(p.y - l.y, p.x - l.x) < 15) {
      applyLoot(l);
      spawnParticle(l.x, l.y, C_LOOT, 20);
      loot.splice(i, 1);
      // Respawn a new crate to keep the arena spicy
      if (loot.length < 3 && Math.random() < 0.7) loot.push(spawnLoot());
    }
  }

  // Ambient crate spawns so the match doesn't go dry
  lootSpawnCd--;
  const lootTarget = zoneRadius > 90 ? 4 : (zoneRadius > 60 ? 3 : 2);
  if (lootSpawnCd <= 0) {
    if (loot.length < lootTarget) loot.push(spawnLoot());
    lootSpawnCd = 150 + Math.random() * 120;
  }

  // 4. Update Bots
  for (let i = bots.length - 1; i >= 0; i--) {
    let b = bots[i];
    
    // AI Logic
    let distToCenterBot = Math.hypot(b.y - cv.height/2, b.x - cv.width/2);
    const potentialTargets = [...bots.filter(ob => ob !== b), p];
    let { target, dist } = getNearestTarget(b, potentialTargets);

    if (distToCenterBot > zoneRadius - 20) {
      b.state = 'FLEE_ZONE';
      b.tx = cv.width/2 + (Math.random()-0.5)*70;
      b.ty = cv.height/2 + (Math.random()-0.5)*70;
    } else if (target && dist < 150) {
      b.state = 'ATTACK';
    } else {
      if (frames % 60 === 0 && Math.random() < 0.5) {
        b.state = 'WANDER';
        b.tx = b.x + (Math.random()-0.5)*100;
        b.ty = b.y + (Math.random()-0.5)*100;
      }
    }

    // Bot Movement (ship-like drift + thrust)
    let desiredAng = b.ang;
    if (b.state === 'FLEE_ZONE' || b.state === 'WANDER') {
      desiredAng = Math.atan2(b.ty - b.y, b.tx - b.x);
    } else if (b.state === 'ATTACK' && target) {
      const tx = target.x ?? target.x;
      const ty = target.y ?? target.y;
      // Hunters close; snipers orbit; cowards keep range
      if (b.persona === 'SNIPER') {
        desiredAng = Math.atan2(ty - b.y, tx - b.x) + (Math.random() < 0.5 ? 1 : -1) * 0.9;
      } else if (b.persona === 'COWARD') {
        desiredAng = Math.atan2(b.y - ty, b.x - tx);
      } else {
        desiredAng = Math.atan2(ty - b.y, tx - b.x);
      }
    }
    let da = ((desiredAng - b.ang + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
    b.ang += clamp(da, -b.turn, b.turn);
    const wantsThrust = (b.state === 'FLEE_ZONE' || b.state === 'WANDER' || (b.state === 'ATTACK' && b.persona !== 'SNIPER')) ? 1 : (Math.random() < 0.25 ? 1 : 0);
    if (wantsThrust) {
      b.vx += Math.cos(b.ang) * b.thrust;
      b.vy += Math.sin(b.ang) * b.thrust;
    }
    b.vx *= b.drag;
    b.vy *= b.drag;
    b.x += b.vx;
    b.y += b.vy;
    b.x = clamp(b.x, 10, cv.width - 10);
    b.y = clamp(b.y, 10, cv.height - 10);

    // Bot Zone Damage
    if (distToCenterBot > zoneRadius) b.hp -= (zoneRadius > 85 ? 0.45 : (zoneRadius > 55 ? 0.65 : 0.95));

    // Bot Fire
    b.reload--;
    const fireDist = b.persona === 'SNIPER' ? 240 : 190;
    if (b.state === 'ATTACK' && target && b.reload <= 0 && dist < fireDist) {
      // Simple lead aim based on target velocity
      const tvx = target.vx ?? 0;
      const tvy = target.vy ?? 0;
      const lead = b.persona === 'SNIPER' ? 18 : 10;
      const aimX = target.x + tvx * lead;
      const aimY = target.y + tvy * lead;
      let ang = Math.atan2(aimY - b.y, aimX - b.x);
      bullets.push({x: b.x + Math.cos(ang)*10, y: b.y + Math.sin(ang)*10, vx: Math.cos(ang)*5.6, vy: Math.sin(ang)*5.6, isPlayer: false, dmg: 11, owner: b, life: 120});
      b.reload = (b.persona === 'HUNTER' ? 28 : 40) + Math.random()*28;
    }

    // Death
    if (b.hp <= 0) {
      spawnParticle(b.x, b.y, C_BOT, 30);
      elims++;
      // (score is computed from elims + time; bonus visuals handled separately)
      if (Math.random() < 0.55) loot.push({x: b.x, y: b.y, type: Math.random() < 0.15 ? 'REPAIR' : (Math.random() < 0.5 ? 'TRIPLE' : 'SHIELD')}); // Drop loot
      bots.splice(i, 1);
    }
  }

  // 5. Update Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    let b = bullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.life != null) { b.life--; if (b.life <= 0) { bullets.splice(i, 1); continue; } }

    // Out of bounds
    if (b.x < 0 || b.x > cv.width || b.y < 0 || b.y > cv.height) {
      bullets.splice(i, 1); continue;
    }

    let hit = false;
    if (b.isPlayer) {
      // Check bots
      for (let j = bots.length - 1; j >= 0; j--) {
        if (Math.hypot(bots[j].y - b.y, bots[j].x - b.x) < 12) {
          bots[j].hp -= b.dmg;
          spawnParticle(b.x, b.y, C_BUL, 5);
          hit = true; break;
        }
      }
    } else {
      // Check player
      if (Math.hypot(p.y - b.y, p.x - b.x) < 10 && p.invuln <= 0) {
        if (p.shield > 0) {
          p.shield--;
          spawnParticle(b.x, b.y, C_LOOT, 12);
        } else {
          p.hp -= b.dmg;
          spawnParticle(b.x, b.y, C_ZONE, 10);
        }
        hit = true;
      }
      // Check other bots (friendly fire is ON in Battle Royale!)
      if (!hit) {
        for (let j = bots.length - 1; j >= 0; j--) {
          if (bots[j] !== b.owner && Math.hypot(bots[j].y - b.y, bots[j].x - b.x) < 12) {
            bots[j].hp -= b.dmg;
            spawnParticle(b.x, b.y, C_BUL, 5);
            hit = true; break;
          }
        }
      }
    }
    if (hit && !b.pierce) bullets.splice(i, 1);
  }

  // 6. Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    let pt = particles[i];
    pt.x += pt.vx; pt.y += pt.vy; pt.life--;
    if (pt.life <= 0) particles.splice(i, 1);
  }

  // 7. Win/Loss Conditions
  if (p.hp <= 0) {
    state = 'OVER';
    const placed = bots.length + 1;
    const aliveBonus = placed === 1 ? 500 : 0;
    const timeBonus = survivalSeconds * 10;
    const finalScore = elims * 1000 + aliveBonus + timeBonus;
    queueZoneCollapseScore({ placed, elims, score: finalScore });
  } else if (bots.length === 0) {
    state = 'WIN';
    const placed = 1;
    const aliveBonus = 500;
    const timeBonus = survivalSeconds * 10;
    const finalScore = elims * 1000 + aliveBonus + timeBonus;
    score = Math.max(score, finalScore);
    queueZoneCollapseScore({ placed, elims, score: finalScore });
  }
}

// --- Rendering ---
function draw() {
  ctx.clearRect(0, 0, cv.width, cv.height);

  // Space starfield
  ctx.fillStyle = '#07000f';
  ctx.fillRect(0, 0, cv.width, cv.height);
  ctx.fillStyle = C_STAR;
  for (const s of stars) {
    ctx.globalAlpha = 0.35 + s.s;
    ctx.fillRect(s.x, s.y, s.r, s.r);
    s.y += s.s * 0.6;
    if (s.y > cv.height) { s.y = -2; s.x = Math.random() * cv.width; }
  }
  ctx.globalAlpha = 1;

  // Draw Safe Zone
  ctx.fillStyle = C_SAFE;
  ctx.beginPath();
  ctx.arc(cv.width/2, cv.height/2, Math.max(0, zoneRadius), 0, Math.PI*2);
  ctx.fill();

  // Zone border
  ctx.shadowColor = C_ZONE; ctx.shadowBlur = 15;
  ctx.strokeStyle = C_ZONE; ctx.lineWidth = 3;
  ctx.stroke();
  
  // Danger Grid outside zone
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,0,60,0.1)';
  ctx.lineWidth = 1;
  for(let i=0; i<cv.width; i+=20) {
    ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,cv.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(cv.width,i); ctx.stroke();
  }

  ctx.lineJoin = 'round';

  // Draw Loot
  loot.forEach(l => {
    ctx.shadowColor = C_LOOT; ctx.shadowBlur = 10;
    ctx.fillStyle = C_LOOT;
    ctx.fillRect(l.x - 5, l.y - 5, 10, 10);
    ctx.fillStyle = '#fff';
    ctx.fillRect(l.x - 2, l.y - 2, 4, 4);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#0a0a1a';
    ctx.font = '7px "Press Start 2P"';
    const ch =
      l.type === 'SHIELD' ? 'S' :
      l.type === 'REPAIR' ? 'H' :
      l.type === 'BOOST' ? 'T' :
      l.type === 'TRIPLE' ? '3' :
      l.type === 'RAPID' ? 'R' :
      l.type === 'PIERCE' ? 'P' : '?';
    ctx.fillText(ch, l.x - 3, l.y + 3);
  });

  // Draw Particles
  particles.forEach(pt => {
    ctx.shadowColor = pt.color; ctx.shadowBlur = 5;
    ctx.fillStyle = pt.color;
    ctx.globalAlpha = pt.life / 30;
    ctx.fillRect(pt.x, pt.y, 2, 2);
  });
  ctx.globalAlpha = 1;

  // Draw Bots
  bots.forEach(b => {
    ctx.shadowColor = C_BOT; ctx.shadowBlur = 10;
    ctx.strokeStyle = C_BOT;
    ctx.lineWidth = 2;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.ang);
    ctx.beginPath();
    ctx.moveTo(10, 0);
    ctx.lineTo(-8, -6);
    ctx.lineTo(-5, 0);
    ctx.lineTo(-8, 6);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
    // Bot HP bar
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#222'; ctx.fillRect(b.x - 10, b.y - 15, 20, 3);
    ctx.fillStyle = C_ZONE; ctx.fillRect(b.x - 10, b.y - 15, 20 * (b.hp/55), 3);
  });

  // Draw Bullets
  bullets.forEach(b => {
    ctx.shadowColor = b.isPlayer ? C_BUL : C_ZONE; ctx.shadowBlur = 8;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(b.x, b.y, 2.5, 0, Math.PI*2); ctx.fill();
  });

  // Draw Player
  if (state === 'PLAY' || state === 'WIN') {
    ctx.shadowColor = C_PLY; ctx.shadowBlur = 15;
    ctx.strokeStyle = C_PLY;
    ctx.lineWidth = 2;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.ang);
    if (p.invuln > 0) ctx.globalAlpha = 0.55 + Math.sin(Date.now() * 0.03) * 0.35;
    ctx.beginPath();
    ctx.moveTo(12, 0);
    ctx.lineTo(-9, -7);
    ctx.lineTo(-6, 0);
    ctx.lineTo(-9, 7);
    ctx.closePath();
    ctx.stroke();
    ctx.globalAlpha = 1;
    // Nose dot
    ctx.fillStyle = '#fff';
    ctx.fillRect(8, -1, 2, 2);
    ctx.restore();

    // Shield pips
    if (p.shield > 0) {
      ctx.shadowBlur = 10;
      ctx.shadowColor = C_LOOT;
      ctx.strokeStyle = C_LOOT;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 16, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    
    // Player HP Bar UI (bottom)
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#222'; ctx.fillRect(20, cv.height - 20, cv.width - 40, 10);
    ctx.fillStyle = p.hp > 30 ? C_LOOT : C_ZONE; 
    ctx.fillRect(20, cv.height - 20, (cv.width - 40) * Math.max(0, p.hp/p.maxHp), 10);
    ctx.fillStyle = '#fff'; ctx.font = '8px "Press Start 2P"';
    ctx.fillText(`HP: ${Math.ceil(Math.max(0, p.hp))}`, 25, cv.height - 11);
    
    // Power level
    ctx.fillStyle = C_BUL;
    const wep = p.weapon === 'single' ? '1' : (p.weapon === 'triple' ? '3' : (p.weapon === 'rapid' ? 'R' : 'P'));
    ctx.fillText(`WPN: ${wep}`, cv.width - 90, cv.height - 11);
  }

  // --- UI ---
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '10px "Press Start 2P"';
  
  if (state === 'PLAY') {
    ctx.fillText(`ALIVE: ${bots.length + 1}`, 10, 20);
    ctx.fillStyle = '#fff';
    ctx.font = '8px "Press Start 2P"';
    ctx.fillText(`ELIMS: ${elims}`, 10, 38);
    ctx.textAlign = 'right';
    ctx.fillStyle = C_BUL;
    ctx.fillText(String(score).padStart(6, '0'), cv.width - 10, 20);
    ctx.textAlign = 'left';
    if (bots.length === 1) {
      ctx.fillStyle = C_LOOT;
      ctx.fillText(`1V1!`, cv.width/2 - 20, 20);
    }
  } else if (state === 'TITLE') {
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,cv.width,cv.height);
    ctx.textAlign = 'center';
    ctx.shadowColor = C_ZONE; ctx.shadowBlur = 20;
    ctx.fillStyle = C_ZONE; ctx.font = '22px "Press Start 2P"';
    ctx.fillText('ZONE COLLAPSE', cv.width/2, cv.height/2 - 40);
    
    ctx.shadowBlur = 0; ctx.font = '8px "Press Start 2P"';
    ctx.fillStyle = '#aaa';
    ctx.fillText('STAY IN THE SAFE CIRCLE', cv.width/2, cv.height/2 + 10);
    ctx.fillText('ROTATE + THRUST + FIRE', cv.width/2, cv.height/2 + 25);
    ctx.fillStyle = C_LOOT;
    ctx.fillText('CRATES: SHIELD / WEAPONS / REPAIR', cv.width/2, cv.height/2 + 40);
    
    if (Math.floor(Date.now() / 500) % 2 === 0) {
      ctx.fillStyle = '#fff'; ctx.font = '10px "Press Start 2P"';
      ctx.fillText('TAP/WASD TO DROP IN', cv.width/2, cv.height - 50);
    }
    ctx.textAlign = 'left';
  } else if (state === 'OVER') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.textAlign = 'center';
    ctx.shadowColor = C_ZONE; ctx.shadowBlur = 20;
    ctx.fillStyle = C_ZONE; ctx.font = '24px "Press Start 2P"';
    ctx.fillText('ELIMINATED', cv.width/2, cv.height/2 - 20);
    ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = '12px "Press Start 2P"';
    ctx.fillText(`PLACED: #${bots.length + 1}`, cv.width/2, cv.height/2 + 20);
    if (lastElims != null) {
      ctx.fillStyle = C_BUL; ctx.font = '10px "Press Start 2P"';
      ctx.fillText(`ELIMS: ${lastElims}   SCORE: ${lastScore ?? 0}`, cv.width/2, cv.height/2 + 44);
    }
    
    if (Math.floor(Date.now() / 500) % 2 === 0) {
      ctx.fillStyle = '#aaa'; ctx.font = '10px "Press Start 2P"';
      ctx.fillText('TAP TO RETRY', cv.width/2, cv.height/2 + 60);
    }
    ctx.textAlign = 'left';
  } else if (state === 'WIN') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.textAlign = 'center';
    ctx.shadowColor = C_LOOT; ctx.shadowBlur = 20;
    ctx.fillStyle = C_LOOT; ctx.font = '24px "Press Start 2P"';
    ctx.fillText('CHAMPION', cv.width/2, cv.height/2 - 20);
    ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = '10px "Press Start 2P"';
    ctx.fillText('LAST MACHINE STANDING', cv.width/2, cv.height/2 + 20);
    if (lastElims != null) {
      ctx.fillStyle = C_BUL; ctx.font = '10px "Press Start 2P"';
      ctx.fillText(`ELIMS: ${lastElims}   SCORE: ${lastScore ?? 0}`, cv.width/2, cv.height/2 + 44);
    }
    
    if (Math.floor(Date.now() / 500) % 2 === 0) {
      ctx.fillStyle = C_PLY;
      ctx.fillText('TAP TO PLAY AGAIN', cv.width/2, cv.height/2 + 60);
    }
    ctx.textAlign = 'left';
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Start
loop();
</script>
</body>
</html>
