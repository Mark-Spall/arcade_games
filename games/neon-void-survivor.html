<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID SURVIVOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #020108;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }
  
  #cab {
    position: relative;
    border: 4px solid #111;
    border-radius: 8px;
    box-shadow: 
      0 0 50px rgba(255, 0, 80, 0.2),
      0 0 100px rgba(0, 255, 200, 0.1),
      inset 0 0 40px rgba(0, 0, 0, 0.9);
    background: #050505;
    padding: 8px;
  }
  
  #cv {
    display: block;
    border-radius: 4px;
    image-rendering: pixelated;
    background: #0a0510;
  }
  
  #crt {
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 10;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.15) 0px,
      rgba(0, 0, 0, 0.15) 1px,
      transparent 1px,
      transparent 2px
    );
    animation: flicker 0.15s infinite;
  }
  
  #crt::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 4px;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(20, 0, 0, 0.5) 100%);
  }

  @keyframes flicker {
    0% { opacity: 0.95; }
    50% { opacity: 1; }
    100% { opacity: 0.98; }
  }
</style>
</head>
<body>

<div id="cab">
  <canvas id="cv" width="400" height="500"></canvas>
  <div id="crt"></div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// --- Colors & Aesthetics ---
const C_BG = '#0a0510';
const C_PLY = '#00ffff';
const C_ENM = '#ff003c';
const C_WPN = '#ffff00';
const C_EXP = '#b000ff';
const C_HEART = '#00ff99';
const C_FLNK = '#ff6600';
const C_SWARM = '#ff88cc';
const C_TANK = '#aa0044';

// --- Audio (same pattern as neon-surge / neon-blaster) ---
const AC = window.AudioContext || window.webkitAudioContext;
let ac;
function ea() { if (!ac) ac = new AC(); }

function snd(f, d, t = 'square', v = 0.07) {
  ea();
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = t;
  o.frequency.setValueAtTime(f, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(Math.max(f * 0.2, 20), ac.currentTime + d);
  g.gain.setValueAtTime(v, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + d);
  o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime + d);
}

const SFX = {
  zap: () => snd(620, 0.045, 'square', 0.045),
  kill: () => snd(180, 0.11, 'sawtooth', 0.075),
  gem: () => snd(720, 0.055, 'triangle', 0.055),
  level: () => { snd(480, 0.07); setTimeout(() => snd(960, 0.12, 'square', 0.06), 55); },
  hurt: () => snd(120, 0.07, 'sawtooth', 0.055),
  die: () => { snd(300, 0.45, 'sawtooth', 0.12); setTimeout(() => snd(90, 0.5, 'sawtooth', 0.07), 190); },
  start: () => { snd(220, 0.06); setTimeout(() => snd(440, 0.1), 45); },
  heal: () => { snd(380, 0.07, 'triangle', 0.06); setTimeout(() => snd(520, 0.09, 'sine', 0.05), 60); }
};

// --- Game State ---
let px = 200, py = 250, pSpeed = 2.5;
let hp = 100, maxHp = 100;
let xp = 0, nextXp = 5, level = 1;
let time = 0, frame = 0, score = 0;
let state = 'TITLE'; // TITLE, PLAY, OVER
let keys = { w:0, a:0, s:0, d:0, ArrowUp:0, ArrowLeft:0, ArrowDown:0, ArrowRight:0 };
let pointer = { active: false, x: 200, y: 250 };
let pFace = 0;

let enemies = [];
let pickups = [];
let particles = [];
let arcadeScoreSubmitted = false;
let hurtSfxCd = 0;
let weaponOrbitAcc = 0;
let weaponRender = [];
let hurtBlink = 0;
let contactDmgCd = 0;
let campTimer = 0;
let tipTimer = 480;
const PLY_HIT_R = 9;

// --- Input Handling ---
window.addEventListener('keydown', e => { if(keys[e.key] !== undefined) { keys[e.key] = 1; ea(); } });
window.addEventListener('keyup', e => { if(keys[e.key] !== undefined) keys[e.key] = 0; });

function handlePointer(e) {
  e.preventDefault();
  ea();
  if (state !== 'PLAY') { initGame(); return; }
  let rect = cv.getBoundingClientRect();
  let touch = e.touches ? e.touches[0] : e;
  pointer.x = (touch.clientX - rect.left) * (cv.width / rect.width);
  pointer.y = (touch.clientY - rect.top) * (cv.height / rect.height);
  pointer.active = e.type !== 'mouseup' && e.type !== 'touchend';
}
cv.addEventListener('mousedown', handlePointer);
cv.addEventListener('mousemove', e => { if(pointer.active) handlePointer(e); });
window.addEventListener('mouseup', handlePointer);
cv.addEventListener('touchstart', handlePointer, {passive: false});
cv.addEventListener('touchmove', handlePointer, {passive: false});
window.addEventListener('touchend', handlePointer);

function initGame() {
  px = 200; py = 250; hp = 100; maxHp = 100;
  xp = 0; nextXp = 5; level = 1;
  time = 0; frame = 0; score = 0;
  enemies = []; pickups = []; particles = [];
  state = 'PLAY';
  arcadeScoreSubmitted = false;
  pointer.active = false;
  pointer.x = px;
  pointer.y = py;
  for (const k of Object.keys(keys)) keys[k] = 0;
  pFace = -Math.PI / 2;
  hurtSfxCd = 0;
  weaponOrbitAcc = 0;
  hurtBlink = 0;
  contactDmgCd = 0;
  campTimer = 0;
  tipTimer = 480;
  SFX.start();
}

function queueVoidSurvivorScore(finalScore) {
  if (arcadeScoreSubmitted) return;
  arcadeScoreSubmitted = true;
  const s = Math.floor(Number(finalScore)) || 0;
  setTimeout(() => {
    import('/scores.js')
      .then(({ submitScore }) => {
        const raw = prompt('HIGH SCORE — Enter initials (max 12):', 'AAA');
        const name = raw == null ? 'AAA' : raw.trim() || 'AAA';
        submitScore({ gameId: 'neon-void-survivor', name, score: s, limit: 10 });
      })
      .catch(() => {});
  }, 0);
}

function spawnParticle(x, y, color, count) {
  for(let i=0; i<count; i++) {
    particles.push({
      x, y, 
      vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
      life: 20 + Math.random()*10,
      color
    });
  }
}

function drawPlayerShip(c, x, y, face, visible) {
  if (!visible) return;
  c.save();
  c.translate(x, y);
  c.rotate(face);
  c.shadowBlur = 18;
  c.shadowColor = C_PLY;
  let hull = c.createRadialGradient(0, 0, 2, 0, 0, 14);
  hull.addColorStop(0, '#e0ffff');
  hull.addColorStop(0.35, C_PLY);
  hull.addColorStop(0.7, '#0088aa');
  hull.addColorStop(1, 'rgba(0,64,80,0.35)');
  c.strokeStyle = '#7fffff';
  c.lineWidth = 1.5;
  c.fillStyle = hull;
  c.beginPath();
  c.moveTo(10, 0);
  c.lineTo(-6, 7);
  c.lineTo(-2, 0);
  c.lineTo(-6, -7);
  c.closePath();
  c.fill();
  c.stroke();
  c.shadowBlur = 10;
  c.shadowColor = '#00aaff';
  c.fillStyle = 'rgba(0,200,255,0.9)';
  c.beginPath();
  c.arc(-2, 0, 2.5, 0, Math.PI * 2);
  c.fill();
  c.shadowBlur = 14;
  c.shadowColor = '#ff00aa';
  let thr = (frame % 8 < 4) ? 1 : 0.6;
  c.fillStyle = `rgba(255,100,200,${0.5 * thr})`;
  c.beginPath();
  c.moveTo(-8, -3);
  c.lineTo(-14 - thr * 6, 0);
  c.lineTo(-8, 3);
  c.closePath();
  c.fill();
  c.restore();
}

function pickEnemyType() {
  const r = Math.random();
  const t = time;
  if (t < 18) return r < 0.88 ? 'grunt' : 'swarmer';
  if (t < 48) {
    if (r < 0.4) return 'grunt';
    if (r < 0.66) return 'swarmer';
    if (r < 0.86) return 'flanker';
    return 'tank';
  }
  if (r < 0.26) return 'grunt';
  if (r < 0.46) return 'swarmer';
  if (r < 0.71) return 'flanker';
  return 'tank';
}

function spawnEnemyAt(ex, ey) {
  const type = pickEnemyType();
  const baseHp = 1 + Math.floor(time / 15);
  let hp = baseHp;
  let speed = 0.85 + Math.random() * 0.48;
  if (type === 'swarmer') {
    hp = Math.max(1, Math.floor(baseHp * 0.5));
    speed = 1.22 + Math.random() * 0.58;
  } else if (type === 'tank') {
    hp = Math.max(3, Math.floor(baseHp * 2.35) + 2);
    speed = 0.4 + Math.random() * 0.24;
  } else if (type === 'flanker') {
    hp = Math.max(1, Math.floor(baseHp * 0.82));
    speed = 0.92 + Math.random() * 0.38;
  }
  speed *= 1 + Math.min(time, 200) * 0.004;
  enemies.push({ x: ex, y: ey, hp, speed, type, phase: Math.random() * Math.PI * 2 });
}

function enemyHullR(e) {
  if (e.type === 'tank') return 12;
  if (e.type === 'swarmer') return 5;
  if (e.type === 'flanker') return 8;
  return 8;
}

function enemyTouchesPlayer(e) {
  return Math.hypot(py - e.y, px - e.x) < enemyHullR(e) + PLY_HIT_R;
}

function weaponVsEnemyR(e) {
  return e.type === 'tank' ? 18 : 14;
}

function drawEnemy(e) {
  let ang = Math.atan2(py - e.y, px - e.x);
  let col = C_ENM;
  if (e.type === 'swarmer') col = C_SWARM;
  else if (e.type === 'tank') col = C_TANK;
  else if (e.type === 'flanker') col = C_FLNK;
  ctx.shadowColor = col;
  ctx.fillStyle = col;
  ctx.beginPath();
  if (e.type === 'grunt') {
    ctx.moveTo(e.x + Math.cos(ang) * 8, e.y + Math.sin(ang) * 8);
    ctx.lineTo(e.x + Math.cos(ang + 2.5) * 8, e.y + Math.sin(ang + 2.5) * 8);
    ctx.lineTo(e.x + Math.cos(ang - 2.5) * 8, e.y + Math.sin(ang - 2.5) * 8);
  } else if (e.type === 'swarmer') {
    let s = 5;
    ctx.moveTo(e.x + Math.cos(ang) * s, e.y + Math.sin(ang) * s);
    ctx.lineTo(e.x + Math.cos(ang + Math.PI / 2) * s, e.y + Math.sin(ang + Math.PI / 2) * s);
    ctx.lineTo(e.x + Math.cos(ang + Math.PI) * s, e.y + Math.sin(ang + Math.PI) * s);
    ctx.lineTo(e.x + Math.cos(ang - Math.PI / 2) * s, e.y + Math.sin(ang - Math.PI / 2) * s);
  } else if (e.type === 'tank') {
    let R = 11;
    for (let k = 0; k < 6; k++) {
      let a = ang - Math.PI / 2 + k * Math.PI / 3;
      let vx = e.x + Math.cos(a) * R, vy = e.y + Math.sin(a) * R;
      if (k === 0) ctx.moveTo(vx, vy);
      else ctx.lineTo(vx, vy);
    }
  } else {
    ctx.moveTo(e.x + Math.cos(ang) * 10, e.y + Math.sin(ang) * 10);
    ctx.lineTo(e.x + Math.cos(ang + 2.15) * 6, e.y + Math.sin(ang + 2.15) * 6);
    ctx.lineTo(e.x + Math.cos(ang + Math.PI) * 5, e.y + Math.sin(ang + Math.PI) * 5);
    ctx.lineTo(e.x + Math.cos(ang - 2.15) * 6, e.y + Math.sin(ang - 2.15) * 6);
  }
  ctx.closePath();
  ctx.fill();
}

function drawPickup(pu) {
  if (pu.kind === 'xp') {
    ctx.shadowBlur = 10;
    ctx.shadowColor = C_EXP;
    ctx.fillStyle = C_EXP;
    ctx.beginPath();
    ctx.arc(pu.x, pu.y, 3, 0, Math.PI * 2);
    ctx.fill();
    return;
  }
  ctx.shadowBlur = 12;
  ctx.shadowColor = C_HEART;
  ctx.fillStyle = C_HEART;
  let x = pu.x, y = pu.y;
  ctx.beginPath();
  ctx.arc(x - 2.2, y - 1, 2.3, 0, Math.PI * 2);
  ctx.arc(x + 2.2, y - 1, 2.3, 0, Math.PI * 2);
  ctx.moveTo(x - 4.2, y + 0.5);
  ctx.lineTo(x, y + 6);
  ctx.lineTo(x + 4.2, y + 0.5);
  ctx.closePath();
  ctx.fill();
}

function update() {
  if (state !== 'PLAY') {
    if ((keys.w || keys.ArrowUp || keys.s) && state !== 'PLAY') initGame();
    return;
  }
  
  frame++;
  if (frame % 60 === 0) time++;
  if (hurtSfxCd > 0) hurtSfxCd--;
  if (hurtBlink > 0) hurtBlink--;
  if (tipTimer > 0) tipTimer--;

  // Movement: keyboard + pointer can combine; pointer alone when active and far enough
  let dx = 0, dy = 0;
  if (keys.w || keys.ArrowUp) dy -= 1;
  if (keys.s || keys.ArrowDown) dy += 1;
  if (keys.a || keys.ArrowLeft) dx -= 1;
  if (keys.d || keys.ArrowRight) dx += 1;
  if (pointer.active) {
    let pang = Math.atan2(pointer.y - py, pointer.x - px);
    let dist = Math.hypot(pointer.y - py, pointer.x - px);
    if (dist > 8) {
      dx += Math.cos(pang);
      dy += Math.sin(pang);
    }
  }
  let len = Math.hypot(dx, dy);
  if (len > 0) {
    dx /= len;
    dy /= len;
    pFace = Math.atan2(dy, dx);
    campTimer = Math.max(0, campTimer - 3);
  } else {
    campTimer++;
  }

  px += dx * pSpeed; py += dy * pSpeed;
  px = Math.max(10, Math.min(cv.width-10, px));
  py = Math.max(10, Math.min(cv.height-10, py));

  // Weapons — smooth spin + faster with level/time; precession wobble
  let wpnCount = Math.min(level, 8);
  let orbitBase = 40 + Math.min(level * 2, 40);
  let radiusWobble = 1 + Math.sin(frame * 0.021) * 0.055;
  let precession = Math.sin(frame * 0.015) * 0.2 + Math.cos(frame * 0.0087) * 0.12;
  weaponOrbitAcc += 0.0075 + level * 0.0033 + Math.min(time, 120) * 0.00022;
  if (weaponOrbitAcc > 800) weaponOrbitAcc -= 600;
  let weapons = [];
  weaponRender.length = 0;
  let tau = Math.PI * 2;
  for (let i = 0; i < wpnCount; i++) {
    let slotWobble = 1 + Math.sin(frame * 0.018 + i * 1.7) * 0.04;
    let r = orbitBase * radiusWobble * slotWobble;
    let ang = weaponOrbitAcc + precession + (i * tau) / wpnCount;
    let wx = px + Math.cos(ang) * r;
    let wy = py + Math.sin(ang) * r;
    weapons.push({ x: wx, y: wy, r: 6 });
    weaponRender.push({ x: wx, y: wy, ang });
  }

  // Spawning Enemies — faster spawns over time; extra pressure if camping (low movement)
  let campPenalty = Math.min(20, Math.floor(campTimer / 32));
  let spawnRate = Math.max(6, 60 - Math.floor(time / 2) - campPenalty);
  if (frame % spawnRate === 0) {
    let side = Math.floor(Math.random() * 4);
    let ex = side===0 ? -20 : side===1 ? cv.width+20 : Math.random()*cv.width;
    let ey = side===2 ? -20 : side===3 ? cv.height+20 : Math.random()*cv.height;
    spawnEnemyAt(ex, ey);
  }

  // Update Enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    let e = enemies[i];
    let ang = Math.atan2(py - e.y, px - e.x);
    if (e.type === 'flanker') ang += Math.sin(frame * 0.062 + e.phase) * 0.52;
    e.x += Math.cos(ang) * e.speed;
    e.y += Math.sin(ang) * e.speed;

    // Hit by Weapon?
    let hit = false;
    let wHit = weaponVsEnemyR(e);
    for (let w of weapons) {
      if (Math.hypot(w.y - e.y, w.x - e.x) < wHit) {
        e.hp--; hit = true;
        spawnParticle(e.x, e.y, C_WPN, 2);
        break; // Only take 1 hit per frame
      }
    }

    if (hit) {
      if (e.hp <= 0) SFX.kill();
      else SFX.zap();
    }

    if (e.hp <= 0) {
      score += e.type === 'tank' ? 28 : e.type === 'swarmer' ? 7 : e.type === 'flanker' ? 14 : 10;
      spawnParticle(e.x, e.y, C_ENM, e.type === 'tank' ? 8 : 5);
      if (Math.random() < 0.58) pickups.push({ x: e.x, y: e.y, kind: 'xp' });
      let heartChance = hp < maxHp * 0.9 ? 0.11 : 0.042;
      if (e.type === 'tank') heartChance += 0.06;
      if (Math.random() < heartChance) {
        pickups.push({ x: e.x + (Math.random() - 0.5) * 14, y: e.y + (Math.random() - 0.5) * 14, kind: 'heart' });
      }
      enemies.splice(i, 1);
      continue;
    }

  }

  // Contact damage: all overlapping enemies count; ticks on a short cooldown (no long i-frames)
  let touchN = 0;
  for (let e of enemies) {
    if (enemyTouchesPlayer(e)) touchN++;
  }
  if (touchN > 0) {
    contactDmgCd--;
    if (contactDmgCd <= 0) {
      let dmg = Math.min(touchN, 4);
      if (touchN >= 3) dmg = Math.min(touchN + 1, 6);
      hp -= dmg;
      contactDmgCd = 7;
      hurtBlink = 12;
      spawnParticle(px, py, C_ENM, 2 + Math.min(dmg, 4));
      if (hurtSfxCd === 0) {
        hurtSfxCd = 5;
        SFX.hurt();
      }
      if (hp <= 0) {
        state = 'OVER';
        SFX.die();
        queueVoidSurvivorScore(score);
      }
    }
  } else {
    contactDmgCd = 0;
  }

  // Pickups (XP gems + hearts)
  for (let i = pickups.length - 1; i >= 0; i--) {
    let g = pickups[i];
    let dist = Math.hypot(py - g.y, px - g.x);
    if (dist < 62) {
      let mang = Math.atan2(py - g.y, px - g.x);
      g.x += Math.cos(mang) * 4.2;
      g.y += Math.sin(mang) * 4.2;
    }
    if (dist < 15) {
      if (g.kind === 'xp') {
        xp++;
        score += 5;
        SFX.gem();
        if (xp >= nextXp) {
          level++;
          xp = 0;
          nextXp = Math.floor(nextXp * 1.5);
          hp = Math.min(maxHp, hp + 20);
          spawnParticle(px, py, C_PLY, 20);
          SFX.level();
        }
      } else {
        hp = Math.min(maxHp, hp + 14);
        score += 3;
        SFX.heal();
        spawnParticle(px, py, C_HEART, 6);
      }
      pickups.splice(i, 1);
    }
  }

  // Update Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function draw() {
  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, cv.width, cv.height);

  // Analogue Horror/CRT Glitch Effect
  ctx.save();
  if (state === 'PLAY' && Math.random() < 0.02) {
    ctx.translate((Math.random()-0.5)*6, 0);
    ctx.fillStyle = 'rgba(255,0,0,0.1)';
    ctx.fillRect(0, Math.random()*cv.height, cv.width, 10);
  }

  for (let pu of pickups) drawPickup(pu);

  ctx.shadowBlur = 8;
  for (let e of enemies) drawEnemy(e);

  // Draw Particles
  ctx.shadowBlur = 5;
  for (let p of particles) {
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.fillRect(p.x, p.y, 2, 2);
  }

  if (state !== 'TITLE') {
    let plyBlink = hurtBlink === 0 || ((frame >> 2) & 1) === 0;
    drawPlayerShip(ctx, px, py, pFace, plyBlink);
    let shardSpin = 0.082 + level * 0.0045 + Math.min(time, 100) * 0.0004;
    for (let i = 0; i < weaponRender.length; i++) {
      let wr = weaponRender[i];
      let wx = wr.x, wy = wr.y;
      let shard = wr.ang + frame * shardSpin;
      ctx.save();
      ctx.translate(wx, wy);
      ctx.rotate(shard);
      ctx.shadowBlur = 12;
      ctx.shadowColor = C_WPN;
      let grd = ctx.createLinearGradient(-5, -5, 5, 5);
      grd.addColorStop(0, '#fff9a0');
      grd.addColorStop(0.5, C_WPN);
      grd.addColorStop(1, '#ff8800');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.moveTo(6, 0);
      ctx.lineTo(-4, 4);
      ctx.lineTo(-2, 0);
      ctx.lineTo(-4, -4);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }
  ctx.restore(); // Remove glitch transform

  // --- UI ---
  ctx.shadowBlur = 0;
  
  if (state === 'PLAY') {
    // XP Bar
    ctx.fillStyle = '#222'; ctx.fillRect(10, 10, cv.width-20, 8);
    ctx.fillStyle = C_EXP; ctx.fillRect(10, 10, (cv.width-20) * (xp/nextXp), 8);
    // HP Bar (HUD — not tied to sprite)
    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(10, 22, cv.width-20, 6);
    ctx.fillStyle = '#333'; ctx.strokeRect(10, 22, cv.width-20, 6);
    ctx.fillStyle = C_ENM; ctx.fillRect(10, 22, (cv.width-20) * (hp/maxHp), 6);
    ctx.fillStyle = C_PLY;
    ctx.font = '10px "Press Start 2P"';
    ctx.fillText(`LVL:${level}`, 10, 40);
    ctx.textAlign = 'right';
    ctx.fillText(score, cv.width-10, 40);
    ctx.textAlign = 'left';
    if (tipTimer > 0) {
      ctx.fillStyle = `rgba(200,220,255,${0.55 * (tipTimer / 480)})`;
      ctx.font = '7px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.fillText('MAGENTA=XP  GREEN=HEAL  LEVEL=+20HP', cv.width / 2, cv.height - 10);
      ctx.textAlign = 'left';
    }
  } else if (state === 'TITLE') {
    ctx.fillStyle = C_PLY; ctx.textAlign = 'center';
    ctx.shadowColor = C_PLY; ctx.shadowBlur = 15;
    ctx.font = '22px "Press Start 2P"';
    ctx.fillText('VOID SURVIVOR', cv.width/2, cv.height/2 - 20);
    ctx.fillStyle = C_WPN; ctx.font = '10px "Press Start 2P"'; ctx.shadowBlur = 0;
    if (Math.floor(Date.now() / 500) % 2 === 0) ctx.fillText('TAP OR PRESS W TO START', cv.width/2, cv.height/2 + 30);
    ctx.textAlign = 'left';
  } else if (state === 'OVER') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,cv.width,cv.height);
    ctx.fillStyle = C_ENM; ctx.textAlign = 'center';
    ctx.shadowColor = C_ENM; ctx.shadowBlur = 20;
    ctx.font = '26px "Press Start 2P"';
    ctx.fillText('ASSIMILATED', cv.width/2, cv.height/2 - 20);
    ctx.fillStyle = '#fff'; ctx.font = '12px "Press Start 2P"'; ctx.shadowBlur = 0;
    ctx.fillText(`FINAL SCORE: ${score}`, cv.width/2, cv.height/2 + 20);
    ctx.fillText(`TIME: ${Math.floor(time/60)}:${(time%60).toString().padStart(2,'0')}`, cv.width/2, cv.height/2 + 40);
    if (Math.floor(Date.now() / 500) % 2 === 0) {
      ctx.fillStyle = C_WPN; ctx.font = '8px "Press Start 2P"';
      ctx.fillText('TAP TO REBOOT SYSTEM', cv.width/2, cv.height/2 + 80);
    }
    ctx.textAlign = 'left';
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
