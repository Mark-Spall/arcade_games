<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STARFALL COMMAND</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #020108;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
    touch-action: none;
  }
  
  #cab {
    position: relative;
    border: 4px solid #1a1a2e;
    border-radius: 12px;
    box-shadow: 
      0 0 60px rgba(255, 0, 100, 0.2),
      0 0 100px rgba(0, 150, 255, 0.1),
      inset 0 0 40px rgba(0, 0, 0, 0.9);
    background: #05050a;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  
  #cv {
    display: block;
    border-radius: 4px;
    background: #080512;
    cursor: crosshair;
  }
  
  #crt {
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 10;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.1) 0px,
      rgba(0, 0, 0, 0.1) 1px,
      transparent 1px,
      transparent 2px
    );
    box-shadow: inset 0 0 60px rgba(0,0,0,0.8);
  }

  /* Mobile UI for Codes */
  #dial-pad {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    z-index: 20;
    padding: 5px;
  }
  
  .d-col { display: flex; flex-direction: column; gap: 10px; }
  
  .btn {
    background: #111;
    border: 2px solid #0ff;
    color: #0ff;
    font-size: 20px;
    width: 50px; height: 50px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,255,255,0.3);
    cursor: pointer;
    user-select: none;
    font-family: monospace;
  }
  .btn:active { background: #0ff; color: #000; }
  
  @media (min-width: 600px) { #dial-pad { display: none; } }
</style>
</head>
<body>

<div id="cab">
  <canvas id="cv" width="400" height="450"></canvas>
  <div id="dial-pad">
    <button class="btn" id="btn-L">◀</button>
    <div class="d-col">
      <button class="btn" id="btn-U">▲</button>
      <button class="btn" id="btn-D">▼</button>
    </div>
    <button class="btn" id="btn-R">▶</button>
  </div>
  <div id="crt"></div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// --- Game State ---
const GAME_ID = 'neon-starfall-command';
let state = 'TITLE'; 
let frames = 0;
let score = 0;
let shake = 0;
let arcadeScoreSubmitted = false;

let p = { x: 200, y: 225, hp: 3, speed: 2.5, tx: 200, ty: 225, shield: 0 };
let keys = { w:0, a:0, s:0, d:0 };
let pointer = { active: false };

let enemies = [];
let particles = [];
let explosions = [];
let beams = [];
let lasers = []; // Player auto-fire

// --- Orbital Codes Logic ---
let inputSeq = [];
const SYM = { 'U':'▲', 'D':'▼', 'L':'◀', 'R':'▶' };
const COMBOS = [
  { name: 'STRIKE', seq: 'U,R,D', color: '#ff003c', desc: 'AOE BOMB' },
  { name: 'BEAM',   seq: 'L,R,L', color: '#00ffff', desc: 'CROSS LASER' },
  { name: 'SHIELD', seq: 'D,D,U', color: '#39ff14', desc: 'INVINCIBILITY' }
];

function pressDir(dir) {
  if(state !== 'PLAY') return;
  inputSeq.push(dir);
  if (inputSeq.length > 6) inputSeq.shift();
  
  let str = inputSeq.join(',');
  for (let c of COMBOS) {
    if (str.endsWith(c.seq)) {
      triggerOrbital(c.name);
      inputSeq = [];
      break;
    }
  }
}

function triggerOrbital(type) {
  if (type === 'STRIKE') {
    explosions.push({ x: p.x, y: p.y, r: 0, maxR: 120 });
    shake = 20;
  } else if (type === 'BEAM') {
    beams.push({ x: p.x, y: p.y, life: 20 });
    shake = 15;
  } else if (type === 'SHIELD') {
    p.shield = 300; // 5 seconds
    spawnParticle(p.x, p.y, '#39ff14', 30, 4);
  }
}

// --- Inputs ---
window.addEventListener('keydown', e => {
  if(state !== 'PLAY' && e.key === 'Enter') { initGame(); return; }

  if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    e.preventDefault();
  }
  
  // Movement
  let k = e.key.toLowerCase();
  if(keys[k] !== undefined) keys[k] = 1;
  
  // Dials
  if(e.key === 'ArrowUp') pressDir('U');
  if(e.key === 'ArrowDown') pressDir('D');
  if(e.key === 'ArrowLeft') pressDir('L');
  if(e.key === 'ArrowRight') pressDir('R');
});
window.addEventListener('keyup', e => {
  let k = e.key.toLowerCase();
  if(keys[k] !== undefined) keys[k] = 0;
});

// Mobile Movement
function handleMove(e) {
  e.preventDefault();
  if(state !== 'PLAY') { initGame(); return; }
  let rect = cv.getBoundingClientRect();
  let touch = e.touches ? e.touches[0] : e;
  p.tx = (touch.clientX - rect.left) * (cv.width / rect.width);
  p.ty = (touch.clientY - rect.top) * (cv.height / rect.height);
  pointer.active = e.type !== 'mouseup' && e.type !== 'touchend';
}
cv.addEventListener('mousedown', handleMove);
cv.addEventListener('mousemove', e => { if(pointer.active) handleMove(e); });
window.addEventListener('mouseup', () => pointer.active = false);
cv.addEventListener('touchstart', handleMove, {passive: false});
cv.addEventListener('touchmove', handleMove, {passive: false});
cv.addEventListener('touchend', () => pointer.active = false);

// Mobile Dial Buttons
document.getElementById('btn-U').addEventListener('touchstart', (e)=>{e.preventDefault(); pressDir('U');});
document.getElementById('btn-D').addEventListener('touchstart', (e)=>{e.preventDefault(); pressDir('D');});
document.getElementById('btn-L').addEventListener('touchstart', (e)=>{e.preventDefault(); pressDir('L');});
document.getElementById('btn-R').addEventListener('touchstart', (e)=>{e.preventDefault(); pressDir('R');});

// Mouse fallbacks for buttons
document.getElementById('btn-U').addEventListener('mousedown', ()=>pressDir('U'));
document.getElementById('btn-D').addEventListener('mousedown', ()=>pressDir('D'));
document.getElementById('btn-L').addEventListener('mousedown', ()=>pressDir('L'));
document.getElementById('btn-R').addEventListener('mousedown', ()=>pressDir('R'));

function initGame() {
  p = { x: 200, y: 225, hp: 3, speed: 2.5, tx: 200, ty: 225, shield: 60 };
  enemies = []; particles = []; explosions = []; beams = []; lasers = [];
  inputSeq = []; score = 0; frames = 0; shake = 0;
  state = 'PLAY';
  arcadeScoreSubmitted = false;
}

function queueStarfallScore(finalScore) {
  if (arcadeScoreSubmitted) return;
  arcadeScoreSubmitted = true;
  const s = Math.floor(Number(finalScore)) || 0;
  setTimeout(() => {
    import('/scores.js')
      .then(({ submitScore }) => {
        const raw = prompt('HIGH SCORE — Enter initials (max 12):', 'AAA');
        const name = raw == null ? 'AAA' : raw.trim() || 'AAA';
        submitScore({ gameId: GAME_ID, name, score: s, limit: 10 });
      })
      .catch(() => {});
  }, 0);
}

function gameOver() {
  if (state !== 'PLAY') return;
  state = 'OVER';
  queueStarfallScore(score);
}

function spawnParticle(x, y, color, count, speed=2) {
  for(let i=0; i<count; i++) {
    particles.push({
      x, y, 
      vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed,
      life: 15 + Math.random()*20, color
    });
  }
}

// --- Game Loop ---
function update() {
  if (state !== 'PLAY') return;
  frames++;
  if(p.shield > 0) p.shield--;

  // Player Movement
  let dx = 0, dy = 0;
  if (pointer.active) {
    let dist = Math.hypot(p.ty - p.y, p.tx - p.x);
    if (dist > 5) { dx = (p.tx - p.x) / dist; dy = (p.ty - p.y) / dist; }
  } else {
    if (keys.w) dy -= 1; if (keys.s) dy += 1;
    if (keys.a) dx -= 1; if (keys.d) dx += 1;
    let dist = Math.hypot(dx, dy);
    if (dist > 0) { dx /= dist; dy /= dist; }
  }
  p.x += dx * p.speed; p.y += dy * p.speed;
  p.x = Math.max(10, Math.min(cv.width-10, p.x));
  p.y = Math.max(10, Math.min(cv.height-10, p.y));

  // Player Auto-Fire (Weak)
  if (frames % 25 === 0 && enemies.length > 0) {
    let target = enemies.reduce((a, b) => Math.hypot(a.y-p.y, a.x-p.x) < Math.hypot(b.y-p.y, b.x-p.x) ? a : b);
    let ang = Math.atan2(target.y - p.y, target.x - p.x);
    lasers.push({ x: p.x, y: p.y, vx: Math.cos(ang)*10, vy: Math.sin(ang)*10, life: 60 });
  }

  // Update Auto-Lasers
  for (let i = lasers.length - 1; i >= 0; i--) {
    let l = lasers[i];
    l.x += l.vx; l.y += l.vy; l.life--;
    if (l.life <= 0) { lasers.splice(i, 1); continue; }
    
    for (let j = enemies.length - 1; j >= 0; j--) {
      let e = enemies[j];
      if (Math.hypot(l.y - e.y, l.x - e.x) < 12) {
        e.hp--;
        spawnParticle(e.x, e.y, '#ffff00', 3);
        lasers.splice(i, 1);
        break;
      }
    }
  }

  // Spawn Enemies (Swarm logic)
  let spawnRate = Math.max(10, 60 - Math.floor(frames / 120));
  if (frames % spawnRate === 0) {
    let side = Math.floor(Math.random() * 4);
    let ex = side===0 ? -20 : side===1 ? cv.width+20 : Math.random()*cv.width;
    let ey = side===2 ? -20 : side===3 ? cv.height+20 : Math.random()*cv.height;
    enemies.push({ x: ex, y: ey, hp: 2 + Math.floor(frames/1000), speed: 0.8 + Math.random()*0.7 });
  }

  // Explosions logic (STRIKE)
  for (let i = explosions.length - 1; i >= 0; i--) {
    let ex = explosions[i];
    ex.r += 8;
    for (let j = enemies.length - 1; j >= 0; j--) {
      let e = enemies[j];
      if (Math.hypot(ex.y - e.y, ex.x - e.x) < ex.r) { e.hp -= 100; }
    }
    if (ex.r >= ex.maxR) explosions.splice(i, 1);
  }

  // Beams logic (BEAM)
  for (let i = beams.length - 1; i >= 0; i--) {
    let b = beams[i];
    b.life--;
    for (let j = enemies.length - 1; j >= 0; j--) {
      let e = enemies[j];
      if (Math.abs(e.x - b.x) < 15 || Math.abs(e.y - b.y) < 15) { e.hp -= 100; }
    }
    if (b.life <= 0) beams.splice(i, 1);
  }

  // Update Enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    let e = enemies[i];
    if (e.hp <= 0) {
      score += 10;
      spawnParticle(e.x, e.y, '#ff0055', 10);
      enemies.splice(i, 1);
      continue;
    }
    
    let ang = Math.atan2(p.y - e.y, p.x - e.x);
    e.x += Math.cos(ang) * e.speed;
    e.y += Math.sin(ang) * e.speed;

    // Hit Player
    if (Math.hypot(p.y - e.y, p.x - e.x) < 12) {
      if (p.shield <= 0) {
        p.hp--;
        p.shield = 60; // iframe
        shake = 10;
        spawnParticle(p.x, p.y, '#00ffff', 20);
        if (p.hp <= 0) gameOver();
      }
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    let pt = particles[i];
    pt.x += pt.vx; pt.y += pt.vy; pt.life--;
    if (pt.life <= 0) particles.splice(i, 1);
  }
}

// --- Rendering ---
function draw() {
  ctx.save();
  ctx.fillStyle = '#080512';
  ctx.fillRect(0, 0, cv.width, cv.height);

  if (shake > 0) {
    ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    shake--;
  }

  // Grid
  ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
  ctx.lineWidth = 1;
  let ox = -(p.x * 0.2) % 40; let oy = -(p.y * 0.2) % 40;
  for(let x=ox; x<cv.width; x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,cv.height); ctx.stroke(); }
  for(let y=oy; y<cv.height; y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(cv.width,y); ctx.stroke(); }

  ctx.lineJoin = 'round';

  // Draw Explosions
  explosions.forEach(ex => {
    ctx.beginPath(); ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255, 0, 60, ${1 - ex.r/ex.maxR})`;
    ctx.fill();
    ctx.strokeStyle = '#ff003c'; ctx.lineWidth = 4; ctx.stroke();
  });

  // Draw Beams
  beams.forEach(b => {
    ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, b.y - 10, cv.width, 20);
    ctx.fillRect(b.x - 10, 0, 20, cv.height);
    ctx.fillStyle = `rgba(0, 255, 255, ${b.life/20})`;
    ctx.fillRect(0, b.y - 15, cv.width, 30);
    ctx.fillRect(b.x - 15, 0, 30, cv.height);
    ctx.shadowBlur = 0;
  });

  // Draw Particles
  particles.forEach(pt => {
    ctx.shadowColor = pt.color; ctx.shadowBlur = 5;
    ctx.fillStyle = pt.color;
    ctx.globalAlpha = pt.life / 35;
    ctx.fillRect(pt.x, pt.y, 3, 3);
  });
  ctx.globalAlpha = 1;

  // Draw Lasers
  lasers.forEach(l => {
    ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 5;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(l.x, l.y, 2, 0, Math.PI*2); ctx.fill();
  });

  // Draw Enemies
  enemies.forEach(e => {
    ctx.shadowColor = '#ff0055'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#ff0055';
    ctx.beginPath();
    ctx.moveTo(e.x + 8, e.y);
    ctx.lineTo(e.x - 6, e.y - 6);
    ctx.lineTo(e.x - 3, e.y);
    ctx.lineTo(e.x - 6, e.y + 6);
    ctx.fill();
  });

  // Draw Player
  if (state !== 'TITLE') {
    ctx.shadowColor = '#00ffff'; ctx.shadowBlur = p.shield > 0 ? 30 : 15;
    ctx.fillStyle = p.shield > 0 && Math.floor(frames/5)%2===0 ? '#39ff14' : '#00ffff';
    ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
    
    // Shield bubble
    if (p.shield > 0) {
      ctx.strokeStyle = '#39ff14'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(p.x, p.y, 14, 0, Math.PI*2); ctx.stroke();
    }
  }

  ctx.restore();

  // --- UI overlay ---
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '10px "Press Start 2P"';
  
  if (state === 'PLAY') {
    ctx.fillText(`SCORE: ${score}`, 10, 20);
    ctx.fillStyle = '#ff0055';
    let hpStr = ""; for(let i=0;i<p.hp;i++) hpStr+="♥";
    ctx.fillText(hpStr, cv.width - 50, 20);

    // Combos HUD
    ctx.font = '8px "Press Start 2P"';
    let startY = 40;
    COMBOS.forEach(c => {
      ctx.fillStyle = c.color;
      let seqStr = c.seq.split(',').map(d => SYM[d]).join(' ');
      ctx.fillText(`${c.name}: ${seqStr}`, 10, startY);
      startY += 12;
    });

    // Input Buffer HUD
    ctx.fillStyle = '#fff';
    ctx.font = '12px "Press Start 2P"';
    let inStr = inputSeq.map(d => SYM[d]).join(' ');
    ctx.fillText(`UPLINK: [ ${inStr} ]`, 10, cv.height - 20);

  } else if (state === 'TITLE') {
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,cv.width,cv.height);
    ctx.textAlign = 'center';
    ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#00ffff'; ctx.font = '22px "Press Start 2P"';
    ctx.fillText('STARFALL', cv.width/2, cv.height/2 - 50);
    ctx.fillText('COMMAND', cv.width/2, cv.height/2 - 25);
    
    ctx.shadowBlur = 0; ctx.font = '8px "Press Start 2P"';
    ctx.fillStyle = '#aaa';
    ctx.fillText('WASD / DRAG TO MOVE', cv.width/2, cv.height/2 + 10);
    ctx.fillStyle = '#ff003c';
    ctx.fillText('INPUT CODES TO SURVIVE', cv.width/2, cv.height/2 + 25);
    
    if (Math.floor(Date.now() / 500) % 2 === 0) {
      ctx.fillStyle = '#fff'; ctx.font = '10px "Press Start 2P"';
      ctx.fillText('ENTER / TAP TO DEPLOY', cv.width/2, cv.height - 40);
    }
    ctx.textAlign = 'left';
  } else if (state === 'OVER') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ff003c'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#ff003c'; ctx.font = '24px "Press Start 2P"';
    ctx.fillText('KIA', cv.width/2, cv.height/2 - 20);
    
    ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = '10px "Press Start 2P"';
    ctx.fillText(`FINAL SCORE: ${score}`, cv.width/2, cv.height/2 + 20);
    
    if (Math.floor(Date.now() / 500) % 2 === 0) {
      ctx.fillStyle = '#00ffff';
      ctx.fillText('TAP TO REDEPLOY', cv.width/2, cv.height/2 + 60);
    }
    ctx.textAlign = 'left';
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Boot up
loop();
</script>
</body>
</html>
