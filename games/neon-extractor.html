<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON EXTRACTOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #010005;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }
  
  #cab {
    position: relative;
    border: 4px solid #1a1a1a;
    border-radius: 8px;
    box-shadow: 
      0 0 50px rgba(0, 255, 128, 0.15),
      0 0 100px rgba(255, 0, 128, 0.1),
      inset 0 0 40px rgba(0, 0, 0, 0.9);
    background: #050505;
    padding: 8px;
  }
  
  #cv {
    display: block;
    border-radius: 4px;
    background: #050212;
  }
  
  #crt {
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 10;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.15) 0px,
      rgba(0, 0, 0, 0.15) 1px,
      transparent 1px,
      transparent 2px
    );
    animation: flicker 0.15s infinite;
  }
  
  #crt::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 4px;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(10, 0, 20, 0.6) 100%);
  }

  @keyframes flicker {
    0% { opacity: 0.95; }
    50% { opacity: 1; }
    100% { opacity: 0.98; }
  }
</style>
</head>
<body>

<div id="cab">
  <canvas id="cv" width="320" height="480"></canvas>
  <div id="crt"></div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// --- Colors ---
const C_BG = '#050212';
const C_PLY = '#00f0ff';
const C_LSR = '#ffe600';
const C_ENM = '#ff003c';
const C_POD = '#39ff14';

// --- Game State ---
let state = 'TITLE'; // TITLE, PLAY, OVER
let frames = 0, score = 0, rescued = 0;
let p = { x: 60, y: 240, vy: 0, radius: 8 };
let gravity = 0.25;
let thrust = -4.5;
let scrollSpeed = 2.5;

let lasers = [];
let enemies = [];
let pods = [];
let particles = [];
let stars = [];
let arcadeScoreSubmitted = false;

// Initialize Starfield
for(let i=0; i<50; i++) stars.push({x: Math.random()*cv.width, y: Math.random()*cv.height, speed: Math.random()*2+0.5});

function initGame() {
  p.y = 240; p.vy = 0;
  lasers = []; enemies = []; pods = []; particles = [];
  frames = 0; score = 0; rescued = 0; scrollSpeed = 2.5;
  state = 'PLAY';
  arcadeScoreSubmitted = false;
}

function queueNeonExtractorScore(finalScore) {
  if (arcadeScoreSubmitted) return;
  arcadeScoreSubmitted = true;
  const s = Math.floor(Number(finalScore)) || 0;
  setTimeout(() => {
    import('/scores.js')
      .then(({ submitScore }) => {
        const raw = prompt('HIGH SCORE — Enter initials (max 12):', 'AAA');
        const name = raw == null ? 'AAA' : raw.trim() || 'AAA';
        submitScore({ gameId: 'neon-extractor', name, score: s, limit: 10 });
      })
      .catch(() => {});
  }, 0);
}

function gameOver() {
  if (state !== 'PLAY') return;
  state = 'OVER';
  queueNeonExtractorScore(score);
}

// --- Inputs ---
function action(e) {
  if (e) e.preventDefault();
  if (state === 'TITLE' || state === 'OVER') {
    initGame();
  } else if (state === 'PLAY') {
    p.vy = thrust; // Flap
    lasers.push({ x: p.x + p.radius, y: p.y }); // Auto-shoot on flap
    spawnParticle(p.x - p.radius, p.y, C_PLY, 3, -2); // Thruster exhaust
  }
}

window.addEventListener('keydown', e => { if (e.code === 'Space') action(e); });
cv.addEventListener('mousedown', action);
cv.addEventListener('touchstart', action, {passive: false});

function spawnParticle(x, y, color, count, vxOffset=0) {
  for(let i=0; i<count; i++) {
    particles.push({
      x, y, 
      vx: (Math.random()-0.5)*3 + vxOffset, 
      vy: (Math.random()-0.5)*3,
      life: 15 + Math.random()*15,
      color
    });
  }
}

// --- Game Loop ---
function update() {
  frames++;
  
  // Starfield parallax
  stars.forEach(s => {
    s.x -= s.speed;
    if (s.x < 0) { s.x = cv.width; s.y = Math.random() * cv.height; }
  });

  if (state !== 'PLAY') return;

  // Difficulty scaling
  if (frames % 600 === 0) scrollSpeed += 0.2;

  // Player physics
  p.vy += gravity;
  p.y += p.vy;

  // Floor/Ceiling collision
  if (p.y < 0 || p.y > cv.height) {
    spawnParticle(p.x, p.y, C_PLY, 20);
    gameOver();
  }

  // Lasers
  for (let i = lasers.length - 1; i >= 0; i--) {
    lasers[i].x += 8;
    if (lasers[i].x > cv.width) lasers.splice(i, 1);
  }

  // Spawning
  if (frames % 80 === 0) {
    let type = Math.random();
    let spawnY = 40 + Math.random() * (cv.height - 80);
    if (type < 0.3) {
      // Spawn Rescue Pod
      pods.push({ x: cv.width + 20, y: spawnY, radius: 10, active: true });
    } else {
      // Spawn Enemy Drone (moves up/down slightly)
      enemies.push({ 
        x: cv.width + 20, y: spawnY, radius: 12, 
        baseY: spawnY, phase: Math.random()*Math.PI*2 
      });
    }
  }

  // Enemy Logic
  for (let i = enemies.length - 1; i >= 0; i--) {
    let e = enemies[i];
    e.x -= scrollSpeed;
    e.y = e.baseY + Math.sin(frames * 0.05 + e.phase) * 30; // Wobble

    // Collision with Player
    let distToP = Math.hypot(p.x - e.x, p.y - e.y);
    if (distToP < p.radius + e.radius - 2) {
      spawnParticle(p.x, p.y, C_PLY, 20);
      spawnParticle(e.x, e.y, C_ENM, 15);
      gameOver();
    }

    // Collision with Lasers
    for (let j = lasers.length - 1; j >= 0; j--) {
      let l = lasers[j];
      if (Math.hypot(l.x - e.x, l.y - e.y) < e.radius + 4) {
        spawnParticle(e.x, e.y, C_ENM, 10);
        score += 50;
        enemies.splice(i, 1);
        lasers.splice(j, 1);
        break; // Enemy destroyed, move to next
      }
    }
    
    if (e && e.x < -30) enemies.splice(i, 1);
  }

  // Pod (Rescue) Logic
  for (let i = pods.length - 1; i >= 0; i--) {
    let pod = pods[i];
    pod.x -= scrollSpeed;

    // Rescue collision
    if (pod.active && Math.hypot(p.x - pod.x, p.y - pod.y) < p.radius + pod.radius + 15) {
      pod.active = false;
      rescued++;
      score += 150;
      spawnParticle(pod.x, pod.y, C_POD, 15);
    }

    if (pod.x < -30) pods.splice(i, 1);
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    let pt = particles[i];
    pt.x += pt.vx - (scrollSpeed * 0.5);
    pt.y += pt.vy;
    pt.life--;
    if (pt.life <= 0) particles.splice(i, 1);
  }
}

// --- Rendering ---
function draw() {
  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, cv.width, cv.height);

  // Stars
  ctx.fillStyle = '#333';
  stars.forEach(s => ctx.fillRect(s.x, s.y, s.speed, s.speed));

  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  // Draw Pods
  pods.forEach(pod => {
    if (!pod.active) return;
    ctx.shadowColor = C_POD; ctx.shadowBlur = 10;
    ctx.strokeStyle = C_POD; ctx.lineWidth = 2;
    ctx.strokeRect(pod.x - 6, pod.y - 8, 12, 16);
    ctx.fillStyle = C_POD; ctx.fillRect(pod.x - 3, pod.y - 4, 6, 8);
  });

  // Draw Enemies
  enemies.forEach(e => {
    ctx.shadowColor = C_ENM; ctx.shadowBlur = 15;
    ctx.strokeStyle = C_ENM; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(e.x - e.radius, e.y);
    ctx.lineTo(e.x, e.y - e.radius);
    ctx.lineTo(e.x + e.radius, e.y);
    ctx.lineTo(e.x, e.y + e.radius);
    ctx.closePath(); ctx.stroke();
    // Inner core
    ctx.fillStyle = C_ENM;
    ctx.beginPath(); ctx.arc(e.x, e.y, 3, 0, Math.PI*2); ctx.fill();
  });

  // Draw Lasers
  lasers.forEach(l => {
    ctx.shadowColor = C_LSR; ctx.shadowBlur = 10;
    ctx.fillStyle = '#fff';
    ctx.fillRect(l.x, l.y - 1, 12, 2);
  });

  // Draw Particles
  particles.forEach(pt => {
    ctx.shadowColor = pt.color; ctx.shadowBlur = 5;
    ctx.fillStyle = pt.color;
    ctx.globalAlpha = pt.life / 30;
    ctx.fillRect(pt.x, pt.y, 2, 2);
    ctx.globalAlpha = 1;
  });

  if (state !== 'TITLE' && state !== 'OVER' || (state === 'OVER' && frames % 20 < 10)) {
    // Draw Player Ship
    ctx.shadowColor = C_PLY; ctx.shadowBlur = 15;
    ctx.strokeStyle = C_PLY; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(p.x + p.radius, p.y);
    ctx.lineTo(p.x - p.radius, p.y - p.radius + 2);
    ctx.lineTo(p.x - p.radius + 4, p.y);
    ctx.lineTo(p.x - p.radius, p.y + p.radius - 2);
    ctx.closePath();
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.fillRect(p.x - 2, p.y - 1, 4, 2);
  }

  // --- UI ---
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '10px "Press Start 2P"';
  
  if (state === 'PLAY') {
    ctx.fillText(`PTS:${score}`, 10, 20);
    ctx.fillStyle = C_POD;
    ctx.fillText(`SAVED:${rescued}`, cv.width - 90, 20);
  } 
  else if (state === 'TITLE') {
    ctx.textAlign = 'center';
    ctx.shadowColor = C_PLY; ctx.shadowBlur = 15;
    ctx.fillStyle = C_PLY; ctx.font = '18px "Press Start 2P"';
    ctx.fillText('NEON EXTRACTOR', cv.width/2, cv.height/2 - 40);
    
    ctx.shadowBlur = 0; ctx.font = '8px "Press Start 2P"';
    ctx.fillStyle = '#aaa';
    ctx.fillText('TAP/SPACE TO FLY & FIRE', cv.width/2, cv.height/2 + 10);
    ctx.fillStyle = C_POD;
    ctx.fillText('RESCUE GREEN PODS', cv.width/2, cv.height/2 + 30);
    ctx.fillStyle = C_ENM;
    ctx.fillText('DESTROY RED DRONES', cv.width/2, cv.height/2 + 50);
    
    if (Math.floor(Date.now() / 500) % 2 === 0) {
      ctx.fillStyle = '#fff'; ctx.font = '10px "Press Start 2P"';
      ctx.fillText('INSERT COIN (TAP)', cv.width/2, cv.height - 40);
    }
    ctx.textAlign = 'left';
  } 
  else if (state === 'OVER') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.textAlign = 'center';
    
    ctx.shadowColor = C_ENM; ctx.shadowBlur = 20;
    ctx.fillStyle = C_ENM; ctx.font = '24px "Press Start 2P"';
    ctx.fillText('MIA', cv.width/2, cv.height/2 - 30);
    
    ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = '10px "Press Start 2P"';
    ctx.fillText(`FINAL SCORE: ${score}`, cv.width/2, cv.height/2 + 10);
    ctx.fillStyle = C_POD;
    ctx.fillText(`OPERATIVES SAVED: ${rescued}`, cv.width/2, cv.height/2 + 30);
    
    if (Math.floor(Date.now() / 500) % 2 === 0) {
      ctx.fillStyle = C_PLY;
      ctx.fillText('TAP TO RETRY', cv.width/2, cv.height/2 + 70);
    }
    ctx.textAlign = 'left';
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Start
loop();
</script>
</body>
</html>
