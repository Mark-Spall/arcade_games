<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON EXTRACTOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #010005;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }
  
  #cab {
    position: relative;
    border: 4px solid #1a1a1a;
    border-radius: 8px;
    box-shadow: 
      0 0 50px rgba(0, 255, 128, 0.15),
      0 0 100px rgba(255, 0, 128, 0.1),
      inset 0 0 40px rgba(0, 0, 0, 0.9);
    background: #050505;
    padding: 8px;
  }
  
  #cv {
    display: block;
    border-radius: 4px;
    background: #050212;
  }
  
  #crt {
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 10;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.15) 0px,
      rgba(0, 0, 0, 0.15) 1px,
      transparent 1px,
      transparent 2px
    );
    animation: flicker 0.15s infinite;
  }
  
  #crt::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 4px;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(10, 0, 20, 0.6) 100%);
  }

  @keyframes flicker {
    0% { opacity: 0.95; }
    50% { opacity: 1; }
    100% { opacity: 0.98; }
  }
</style>
</head>
<body>

<div id="cab">
  <canvas id="cv" width="320" height="480"></canvas>
  <div id="crt"></div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// --- Colors ---
const C_BG = '#050212';
const C_PLY = '#00f0ff';
const C_LSR = '#ffe600';
const C_ENM = '#ff003c';
const C_POD = '#39ff14';

// --- Game State ---
let state = 'TITLE'; // TITLE, PLAY, OVER
let frames = 0, score = 0, rescued = 0;
let p = { x: 60, y: 240, vy: 0, radius: 8 };
let gravity = 0.25;
let thrust = -4.5;
let scrollSpeed = 2.5;

let lasers = [];
let enemies = [];
let pods = [];
let bombs = [];
let powerups = [];
let cave = [];
let particles = [];
let stars = [];
let arcadeScoreSubmitted = false;

let activePower = { type: null, timer: 0 };
let shield = 0; // 1 = shielded
let autoFireCD = 0;

let tunnel = { active: false, t: 0, nextToggle: 240, difficulty: 0 };

// Initialize Starfield
for(let i=0; i<50; i++) stars.push({x: Math.random()*cv.width, y: Math.random()*cv.height, speed: Math.random()*2+0.5});

function initGame() {
  p.y = 240; p.vy = 0;
  lasers = []; enemies = []; pods = []; bombs = []; powerups = []; cave = []; particles = [];
  frames = 0; score = 0; rescued = 0; scrollSpeed = 2.5;
  state = 'PLAY';
  arcadeScoreSubmitted = false;
  activePower = { type: null, timer: 0 };
  shield = 0;
  autoFireCD = 0;
  tunnel = { active: false, t: 0, nextToggle: 180, difficulty: 0 };
}

function queueNeonExtractorScore(finalScore) {
  if (arcadeScoreSubmitted) return;
  arcadeScoreSubmitted = true;
  const s = Math.floor(Number(finalScore)) || 0;
  setTimeout(() => {
    import('/scores.js')
      .then(({ submitScore }) => {
        const raw = prompt('HIGH SCORE — Enter initials (max 12):', 'AAA');
        const name = raw == null ? 'AAA' : raw.trim() || 'AAA';
        submitScore({ gameId: 'neon-extractor', name, score: s, limit: 10 });
      })
      .catch(() => {});
  }, 0);
}

function gameOver() {
  if (state !== 'PLAY') return;
  state = 'OVER';
  queueNeonExtractorScore(score);
}

function givePower(type) {
  if (!type) return;
  if (type === 'shield') {
    shield = 1;
    activePower = { type: 'shield', timer: 520 };
    return;
  }
  if (type === 'spread') activePower = { type: 'spread', timer: 520 };
  else if (type === 'rapid') activePower = { type: 'rapid', timer: 520 };
  else if (type === 'slow') activePower = { type: 'slow', timer: 420 };
}

function dropPower(x, y, forcedType) {
  const roll = Math.random();
  const type =
    forcedType ??
    (roll < 0.28 ? 'shield' : roll < 0.55 ? 'spread' : roll < 0.80 ? 'rapid' : 'slow');
  powerups.push({ x, y, r: 9, type, vy: 0.25, pulse: 0, life: 900 });
}

// --- Inputs ---
function action(e) {
  if (e) e.preventDefault();
  if (state === 'TITLE' || state === 'OVER') {
    initGame();
  } else if (state === 'PLAY') {
    p.vy = thrust; // Flap
    // Shoot on flap. Power-ups can add spread/rapid.
    const base = { x: p.x + p.radius, y: p.y };
    lasers.push({ ...base, vy: 0, pierce: 0 });
    if (activePower.type === 'spread') {
      lasers.push({ ...base, vy: -1.4, pierce: 0 });
      lasers.push({ ...base, vy: 1.4, pierce: 0 });
    }
    spawnParticle(p.x - p.radius, p.y, C_PLY, 3, -2); // Thruster exhaust
  }
}

window.addEventListener('keydown', e => { if (e.code === 'Space') action(e); });
cv.addEventListener('mousedown', action);
cv.addEventListener('touchstart', action, {passive: false});

function spawnParticle(x, y, color, count, vxOffset=0) {
  for(let i=0; i<count; i++) {
    particles.push({
      x, y, 
      vx: (Math.random()-0.5)*3 + vxOffset, 
      vy: (Math.random()-0.5)*3,
      life: 15 + Math.random()*15,
      color
    });
  }
}

function circleRectCollide(cx0, cy0, cr, rx, ry, rw, rh) {
  const nx = Math.max(rx, Math.min(cx0, rx + rw));
  const ny = Math.max(ry, Math.min(cy0, ry + rh));
  const dx = cx0 - nx;
  const dy = cy0 - ny;
  return dx * dx + dy * dy <= cr * cr;
}

// --- Game Loop ---
function update() {
  frames++;
  
  // Starfield parallax
  stars.forEach(s => {
    s.x -= s.speed;
    if (s.x < 0) { s.x = cv.width; s.y = Math.random() * cv.height; }
  });

  if (state !== 'PLAY') return;

  // Difficulty scaling
  if (frames % 600 === 0) scrollSpeed += 0.18;
  tunnel.difficulty = Math.min(1.8, tunnel.difficulty + (frames % 300 === 0 ? 0.05 : 0));

  // Active power timers
  if (activePower.timer > 0) activePower.timer--;
  if (activePower.timer <= 0) {
    if (activePower.type === 'shield') shield = 0;
    activePower.type = null;
  }

  // Player physics
  p.vy += gravity;
  p.y += p.vy;

  // Floor/Ceiling collision
  if (p.y < 0 || p.y > cv.height) {
    spawnParticle(p.x, p.y, C_PLY, 20);
    gameOver();
  }

  // Cave tunnels: come and go
  tunnel.t++;
  if (tunnel.t >= tunnel.nextToggle) {
    tunnel.active = !tunnel.active;
    tunnel.t = 0;
    tunnel.nextToggle = tunnel.active ? (240 + Math.random() * 320) : (160 + Math.random() * 240);
  }

  // Spawn cave segments when active
  if (tunnel.active) {
    const step = 22;
    const baseGap = 170;
    const gapH = Math.max(96, baseGap - Math.floor(frames / 900) * 8);
    if (cave.length === 0 || cave[cave.length - 1].x < cv.width - step) {
      const prev = cave.length ? cave[cave.length - 1] : null;
      const mid = prev ? prev.gapY + prev.gapH / 2 : cv.height / 2;
      const drift = (Math.random() - 0.5) * (80 + tunnel.difficulty * 50);
      const gapY = Math.max(30, Math.min(cv.height - 30 - gapH, mid + drift - gapH / 2));
      cave.push({ x: cv.width + 10, w: step + 6, gapY, gapH });
    }
  }

  // Move cave segments + collision
  for (let i = cave.length - 1; i >= 0; i--) {
    const seg = cave[i];
    seg.x -= scrollSpeed;
    if (seg.x + seg.w < -20) {
      cave.splice(i, 1);
      continue;
    }
    // top wall
    if (circleRectCollide(p.x, p.y, p.radius, seg.x, -10, seg.w, seg.gapY - 8)) gameOver();
    // bottom wall
    if (circleRectCollide(p.x, p.y, p.radius, seg.x, seg.gapY + seg.gapH + 8, seg.w, cv.height - (seg.gapY + seg.gapH))) gameOver();
  }

  // Auto-fire for rapid power
  if (autoFireCD > 0) autoFireCD--;
  if (activePower.type === 'rapid' && autoFireCD <= 0) {
    lasers.push({ x: p.x + p.radius, y: p.y, vy: 0, pierce: 0 });
    autoFireCD = 10;
  }

  // Lasers
  for (let i = lasers.length - 1; i >= 0; i--) {
    lasers[i].x += 9;
    lasers[i].y += (lasers[i].vy || 0);
    if (lasers[i].x > cv.width + 20 || lasers[i].y < -20 || lasers[i].y > cv.height + 20) lasers.splice(i, 1);
  }

  // Spawning
  const spawnEvery = Math.max(34, 82 - Math.floor(frames / 600) * 4);
  if (frames % spawnEvery === 0) {
    let type = Math.random();
    let spawnY = 40 + Math.random() * (cv.height - 80);
    if (type < 0.3) {
      // Spawn Rescue Pod
      pods.push({ x: cv.width + 20, y: spawnY, radius: 10, active: true });
    } else {
      // Spawn Enemy Drone (some become bombers over time)
      const bomber = Math.random() < Math.min(0.25, frames / 5000);
      enemies.push({ 
        x: cv.width + 20, y: spawnY, radius: 12, 
        baseY: spawnY, phase: Math.random()*Math.PI*2,
        bomber,
        bombCD: 40 + Math.random() * 80
      });
    }
  }

  // Enemy Logic
  for (let i = enemies.length - 1; i >= 0; i--) {
    let e = enemies[i];
    const slow = activePower.type === 'slow' ? 0.65 : 1;
    e.x -= scrollSpeed * slow;
    e.y = e.baseY + Math.sin(frames * 0.05 + e.phase) * 30; // Wobble

    // Bomb drops (bombers)
    if (e.bomber) {
      e.bombCD--;
      if (e.bombCD <= 0) {
        bombs.push({ x: e.x, y: e.y, vx: -scrollSpeed * 0.9, vy: 0.4, r: 6, life: 600 });
        e.bombCD = 70 + Math.random() * 90 - Math.min(35, frames / 400);
      }
    }

    // Collision with Player
    let distToP = Math.hypot(p.x - e.x, p.y - e.y);
    if (distToP < p.radius + e.radius - 2) {
      if (shield) {
        shield = 0;
        activePower = { type: null, timer: 0 };
        spawnParticle(p.x, p.y, C_PLY, 12);
        enemies.splice(i, 1);
      } else {
        spawnParticle(p.x, p.y, C_PLY, 20);
        spawnParticle(e.x, e.y, C_ENM, 15);
        gameOver();
      }
    }

    // Collision with Lasers
    for (let j = lasers.length - 1; j >= 0; j--) {
      let l = lasers[j];
      if (Math.hypot(l.x - e.x, l.y - e.y) < e.radius + 4) {
        spawnParticle(e.x, e.y, C_ENM, 10);
        score += 60;
        enemies.splice(i, 1);
        // Chance to drop a power-up on kills, ramps up slowly.
        if (Math.random() < Math.min(0.18, 0.06 + frames / 9000)) dropPower(e.x, e.y);
        lasers.splice(j, 1);
        break; // Enemy destroyed, move to next
      }
    }
    
    if (e && e.x < -30) enemies.splice(i, 1);
  }

  // Bombs
  for (let i = bombs.length - 1; i >= 0; i--) {
    const b = bombs[i];
    b.x += b.vx;
    b.vy += 0.03;
    b.y += b.vy;
    b.life--;
    if (b.life <= 0 || b.x < -40 || b.y > cv.height + 40) {
      bombs.splice(i, 1);
      continue;
    }
    if (Math.hypot(p.x - b.x, p.y - b.y) < p.radius + b.r + 2) {
      spawnParticle(b.x, b.y, C_ENM, 18);
      if (shield) {
        shield = 0;
        activePower = { type: null, timer: 0 };
        bombs.splice(i, 1);
      } else {
        gameOver();
      }
    }
  }

  // Powerups: drift + collect
  for (let i = powerups.length - 1; i >= 0; i--) {
    const u = powerups[i];
    u.x -= scrollSpeed * 0.95;
    u.y += u.vy;
    u.life--;
    u.pulse = Math.sin(Date.now() * 0.012) * 0.25 + 1;
    if (u.life <= 0 || u.x < -40) {
      powerups.splice(i, 1);
      continue;
    }
    if (Math.hypot(p.x - u.x, p.y - u.y) < p.radius + u.r + 8) {
      givePower(u.type);
      spawnParticle(u.x, u.y, u.type === 'shield' ? C_PLY : C_LSR, 16);
      score += 25;
      powerups.splice(i, 1);
    }
  }

  // Pod (Rescue) Logic
  for (let i = pods.length - 1; i >= 0; i--) {
    let pod = pods[i];
    pod.x -= scrollSpeed;

    // Rescue collision
    if (pod.active && Math.hypot(p.x - pod.x, p.y - pod.y) < p.radius + pod.radius + 15) {
      pod.active = false;
      rescued++;
      score += 150;
      spawnParticle(pod.x, pod.y, C_POD, 15);
      // occasional guaranteed drop on rescues
      if (rescued % 3 === 0 || Math.random() < 0.25) dropPower(pod.x, pod.y, Math.random() < 0.45 ? 'rapid' : 'spread');
    }

    if (pod.x < -30) pods.splice(i, 1);
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    let pt = particles[i];
    pt.x += pt.vx - (scrollSpeed * 0.55);
    pt.y += pt.vy;
    pt.life--;
    if (pt.life <= 0) particles.splice(i, 1);
  }
}

// --- Rendering ---
function draw() {
  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, cv.width, cv.height);

  // Stars
  ctx.fillStyle = '#333';
  stars.forEach(s => ctx.fillRect(s.x, s.y, s.speed, s.speed));

  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  // Cave tunnels
  if (cave.length) {
    ctx.shadowBlur = 18;
    ctx.shadowColor = '#7a2cff';
    cave.forEach(seg => {
      // top
      ctx.fillStyle = 'rgba(122,44,255,0.16)';
      ctx.fillRect(seg.x, 0, seg.w, seg.gapY);
      // bottom
      ctx.fillRect(seg.x, seg.gapY + seg.gapH, seg.w, cv.height - (seg.gapY + seg.gapH));

      ctx.strokeStyle = '#b36bff';
      ctx.lineWidth = 2;
      ctx.strokeRect(seg.x + 1, 1, seg.w - 2, seg.gapY - 2);
      ctx.strokeRect(seg.x + 1, seg.gapY + seg.gapH + 1, seg.w - 2, cv.height - (seg.gapY + seg.gapH) - 2);
    });
    ctx.shadowBlur = 0;
  }

  // Draw Pods
  pods.forEach(pod => {
    if (!pod.active) return;
    ctx.shadowColor = C_POD; ctx.shadowBlur = 10;
    ctx.strokeStyle = C_POD; ctx.lineWidth = 2;
    ctx.strokeRect(pod.x - 6, pod.y - 8, 12, 16);
    ctx.fillStyle = C_POD; ctx.fillRect(pod.x - 3, pod.y - 4, 6, 8);
  });

  // Draw Enemies
  enemies.forEach(e => {
    ctx.shadowColor = C_ENM; ctx.shadowBlur = 15;
    ctx.strokeStyle = C_ENM; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(e.x - e.radius, e.y);
    ctx.lineTo(e.x, e.y - e.radius);
    ctx.lineTo(e.x + e.radius, e.y);
    ctx.lineTo(e.x, e.y + e.radius);
    ctx.closePath(); ctx.stroke();
    // Inner core
    ctx.fillStyle = C_ENM;
    ctx.beginPath(); ctx.arc(e.x, e.y, 3, 0, Math.PI*2); ctx.fill();
    if (e.bomber) {
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      ctx.fillRect(e.x - 1, e.y - 10, 2, 4);
    }
  });

  // Draw Lasers
  lasers.forEach(l => {
    ctx.shadowColor = C_LSR; ctx.shadowBlur = 10;
    ctx.fillStyle = '#fff';
    ctx.fillRect(l.x, l.y - 1, 12, 2);
  });

  // Draw Bombs
  bombs.forEach(b => {
    ctx.shadowColor = C_ENM; ctx.shadowBlur = 12;
    ctx.fillStyle = C_ENM;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.fillRect(b.x - 1, b.y - 9, 2, 4);
  });

  // Draw Powerups
  powerups.forEach(u => {
    const s = u.pulse * 10;
    const col = u.type === 'shield' ? C_PLY : (u.type === 'slow' ? '#b000ff' : C_LSR);
    ctx.shadowColor = col; ctx.shadowBlur = 14;
    ctx.fillStyle = col;
    ctx.fillRect(u.x - s / 2, u.y - s / 2, s, s);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#050212';
    ctx.font = '8px \"Press Start 2P\"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(u.type === 'shield' ? 'S' : u.type === 'spread' ? '3' : u.type === 'rapid' ? 'R' : 'T', u.x, u.y + 0.5);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
  });

  // Draw Particles
  particles.forEach(pt => {
    ctx.shadowColor = pt.color; ctx.shadowBlur = 5;
    ctx.fillStyle = pt.color;
    ctx.globalAlpha = pt.life / 30;
    ctx.fillRect(pt.x, pt.y, 2, 2);
    ctx.globalAlpha = 1;
  });

  if (state !== 'TITLE' && state !== 'OVER' || (state === 'OVER' && frames % 20 < 10)) {
    // Draw Player Ship
    ctx.shadowColor = C_PLY; ctx.shadowBlur = 15;
    ctx.strokeStyle = C_PLY; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(p.x + p.radius, p.y);
    ctx.lineTo(p.x - p.radius, p.y - p.radius + 2);
    ctx.lineTo(p.x - p.radius + 4, p.y);
    ctx.lineTo(p.x - p.radius, p.y + p.radius - 2);
    ctx.closePath();
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.fillRect(p.x - 2, p.y - 1, 4, 2);
  }

  // --- UI ---
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '10px "Press Start 2P"';
  
  if (state === 'PLAY') {
    ctx.fillText(`PTS:${score}`, 10, 20);
    ctx.fillStyle = C_POD;
    ctx.fillText(`SAVED:${rescued}`, cv.width - 90, 20);
    if (activePower.type) {
      ctx.fillStyle = activePower.type === 'shield' ? C_PLY : (activePower.type === 'slow' ? '#b000ff' : C_LSR);
      ctx.font = '7px "Press Start 2P"';
      const label = activePower.type === 'spread' ? 'SPREAD' : activePower.type === 'rapid' ? 'RAPID' : activePower.type === 'slow' ? 'SLOW' : 'SHIELD';
      ctx.fillText(label, cv.width / 2 - 30, 20);
    }
    if (shield) {
      ctx.fillStyle = C_PLY;
      ctx.font = '7px "Press Start 2P"';
      ctx.fillText('◆', cv.width / 2 + 40, 20);
    }
  } 
  else if (state === 'TITLE') {
    ctx.textAlign = 'center';
    ctx.shadowColor = C_PLY; ctx.shadowBlur = 15;
    ctx.fillStyle = C_PLY; ctx.font = '18px "Press Start 2P"';
    ctx.fillText('NEON EXTRACTOR', cv.width/2, cv.height/2 - 40);
    
    ctx.shadowBlur = 0; ctx.font = '8px "Press Start 2P"';
    ctx.fillStyle = '#aaa';
    ctx.fillText('TAP/SPACE TO FLY & FIRE', cv.width/2, cv.height/2 + 6);
    ctx.fillStyle = C_POD;
    ctx.fillText('RESCUE GREEN PODS (DROPS)', cv.width/2, cv.height/2 + 26);
    ctx.fillStyle = C_ENM;
    ctx.fillText('AVOID BOMBS • DODGE TUNNELS', cv.width/2, cv.height/2 + 46);
    ctx.fillStyle = C_LSR;
    ctx.fillText('POWERUPS: R=RAPID  3=SPREAD  S=SHIELD  T=SLOW', cv.width/2, cv.height/2 + 66);
    
    if (Math.floor(Date.now() / 500) % 2 === 0) {
      ctx.fillStyle = '#fff'; ctx.font = '10px "Press Start 2P"';
      ctx.fillText('INSERT COIN (TAP)', cv.width/2, cv.height - 40);
    }
    ctx.textAlign = 'left';
  } 
  else if (state === 'OVER') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.textAlign = 'center';
    
    ctx.shadowColor = C_ENM; ctx.shadowBlur = 20;
    ctx.fillStyle = C_ENM; ctx.font = '24px "Press Start 2P"';
    ctx.fillText('MIA', cv.width/2, cv.height/2 - 30);
    
    ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = '10px "Press Start 2P"';
    ctx.fillText(`FINAL SCORE: ${score}`, cv.width/2, cv.height/2 + 10);
    ctx.fillStyle = C_POD;
    ctx.fillText(`OPERATIVES SAVED: ${rescued}`, cv.width/2, cv.height/2 + 30);
    
    if (Math.floor(Date.now() / 500) % 2 === 0) {
      ctx.fillStyle = C_PLY;
      ctx.fillText('TAP TO RETRY', cv.width/2, cv.height/2 + 70);
    }
    ctx.textAlign = 'left';
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Start
loop();
</script>
</body>
</html>
