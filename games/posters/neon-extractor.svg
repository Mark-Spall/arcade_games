<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <radialGradient id="bg" cx="45%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#12001f"/>
      <stop offset="55%" stop-color="#050212"/>
      <stop offset="100%" stop-color="#020008"/>
    </radialGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="55%" stop-color="#39ff14"/>
      <stop offset="100%" stop-color="#ff003c"/>
    </linearGradient>
  </defs>

  <rect width="400" height="240" fill="url(#bg)"/>

  <!-- stars -->
  <g fill="#ffffff" opacity="0.16">
    <circle cx="36" cy="38" r="1.2"/><circle cx="90" cy="24" r="1"/>
    <circle cx="150" cy="56" r="1.1"/><circle cx="210" cy="30" r="1.2"/>
    <circle cx="290" cy="44" r="1.1"/><circle cx="360" cy="28" r="1"/>
    <circle cx="70" cy="190" r="1.1"/><circle cx="140" cy="210" r="1"/>
    <circle cx="250" cy="200" r="1.2"/><circle cx="330" cy="218" r="1"/>
  </g>

  <!-- player ship -->
  <g transform="translate(120,122)" stroke="#00f0ff" stroke-width="4" fill="none" opacity="0.9" stroke-linejoin="round">
    <path d="M20 0 L-16 -14 L-6 0 L-16 14 Z"/>
    <rect x="-6" y="-2" width="12" height="4" fill="#ffffff" stroke="none" opacity="0.9"/>
  </g>

  <!-- laser streak -->
  <rect x="145" y="120" width="70" height="3" fill="#ffe600" opacity="0.9"/>

  <!-- rescue pod -->
  <g transform="translate(265,122)" opacity="0.95">
    <rect x="-10" y="-14" width="20" height="28" rx="3" fill="none" stroke="#39ff14" stroke-width="3"/>
    <rect x="-4" y="-6" width="8" height="12" fill="#39ff14"/>
  </g>

  <!-- enemy drone -->
  <g transform="translate(315,82)" stroke="#ff003c" stroke-width="3" fill="none" opacity="0.9">
    <path d="M0 -12 L12 0 L0 12 L-12 0 Z"/>
    <circle cx="0" cy="0" r="3" fill="#ff003c" stroke="none"/>
  </g>

  <circle cx="265" cy="122" r="38" fill="none" stroke="url(#neon)" stroke-width="3" opacity="0.25"/>
</svg>
