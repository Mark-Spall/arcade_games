<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <radialGradient id="bg" cx="52%" cy="46%" r="78%">
      <stop offset="0%" stop-color="#061425"/>
      <stop offset="55%" stop-color="#02050a"/>
      <stop offset="100%" stop-color="#010206"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="55%" stop-color="#ffff00"/>
      <stop offset="100%" stop-color="#ff003c"/>
    </linearGradient>
  </defs>

  <rect width="400" height="240" fill="url(#bg)"/>

  <!-- chrono rings -->
  <circle cx="200" cy="120" r="76" fill="none" stroke="url(#ring)" stroke-width="5" opacity="0.45"/>
  <circle cx="200" cy="120" r="52" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.18"/>
  <circle cx="200" cy="120" r="34" fill="none" stroke="#ff003c" stroke-width="2" opacity="0.12"/>

  <!-- pulse grid -->
  <g stroke="#00ffff" stroke-width="1" opacity="0.10">
    <path d="M0 60H400M0 120H400M0 180H400"/>
    <path d="M80 0V240M160 0V240M240 0V240M320 0V240"/>
  </g>

  <!-- player -->
  <g transform="translate(185,120)" opacity="0.95">
    <path d="M0 0 L18 -8 L6 0 L18 8 Z" fill="none" stroke="#00ffff" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="3" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- bullets -->
  <g fill="#ffff00" opacity="0.9">
    <circle cx="240" cy="120" r="4"/>
    <circle cx="265" cy="105" r="3"/>
  </g>

  <!-- enemy diamonds -->
  <g fill="none" stroke="#ff003c" stroke-width="3" opacity="0.85">
    <path d="M310 150 L322 162 L310 174 L298 162 Z"/>
    <path d="M110 86 L120 96 L110 106 L100 96 Z"/>
  </g>
</svg>
