<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09061a"/>
      <stop offset="55%" stop-color="#040312"/>
      <stop offset="100%" stop-color="#06121e"/>
    </linearGradient>
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0077ff"/>
    </linearGradient>
  </defs>

  <rect width="400" height="240" fill="url(#bg)"/>

  <!-- maze strokes -->
  <g fill="none" stroke="url(#wall)" stroke-width="6" opacity="0.55" stroke-linecap="round">
    <path d="M40 60 H170 V90 H120 V150 H70 V190 H190"/>
    <path d="M360 60 H230 V100 H300 V140 H350 V190 H230"/>
    <path d="M110 60 V120 H160"/>
    <path d="M290 60 V120 H240"/>
    <path d="M200 190 V70"/>
  </g>

  <!-- pellets -->
  <g fill="#ff00c8" opacity="0.85">
    <circle cx="90" cy="90" r="3"/>
    <circle cx="140" cy="120" r="3"/>
    <circle cx="260" cy="120" r="3"/>
    <circle cx="310" cy="150" r="3"/>
    <circle cx="200" cy="120" r="3"/>
    <circle cx="200" cy="160" r="3"/>
  </g>

  <!-- gobbler -->
  <g transform="translate(132,155)">
    <path d="M0 0
             A26 26 0 1 1 0.1 0
             L26 10
             A26 26 0 0 0 26 -10 Z"
          fill="#ffe600" opacity="0.95"/>
  </g>

  <!-- ghost -->
  <g transform="translate(265,155)" opacity="0.9">
    <path d="M0 16
             C0 6 8 -2 18 -2
             C28 -2 36 6 36 16
             V34
             L30 28 L24 34 L18 28 L12 34 L6 28 L0 34 Z"
          fill="#ff2244"/>
    <circle cx="14" cy="16" r="4" fill="#fff"/>
    <circle cx="26" cy="16" r="4" fill="#fff"/>
  </g>
</svg>
