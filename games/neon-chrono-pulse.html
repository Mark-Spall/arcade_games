<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHRONO-PULSE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }
  
  #cab {
    position: relative;
    border: 4px solid #222;
    border-radius: 10px;
    box-shadow: 
      0 0 40px rgba(0, 255, 255, 0.2),
      0 0 80px rgba(255, 0, 100, 0.1),
      inset 0 0 30px rgba(0, 0, 0, 0.9);
    background: #0a0a0a;
    padding: 8px;
  }
  
  #cv {
    display: block;
    border-radius: 5px;
    background: #02050a;
    cursor: crosshair;
  }
  
  #crt {
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border-radius: 5px;
    pointer-events: none;
    z-index: 10;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.15) 0px,
      rgba(0, 0, 0, 0.15) 1px,
      transparent 1px,
      transparent 2px
    );
  }
  
  #crt::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 5px;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 5, 20, 0.6) 100%);
  }
</style>
</head>
<body>

<div id="cab">
  <canvas id="cv" width="400" height="500"></canvas>
  <div id="crt"></div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// --- Aesthetics ---
const C_BG = '#02050a';
const C_PLY = '#00ffff';    // Cyan player
const C_ENM = '#ff003c';    // Red enemies
const C_PBUL = '#ffff00';   // Yellow player bullets
const C_EBUL = '#ff6600';   // Orange enemy bullets

// --- Game State ---
let state = 'TITLE'; // TITLE, PLAY, OVER
let frames = 0;
let score = 0;
let timeScale = 0.05; 
let targetTimeScale = 0.05;
let arcadeScoreSubmitted = false;

let px = 200, py = 250, pSpeed = 3, pReload = 0;
let keys = { w:0, a:0, s:0, d:0, ArrowUp:0, ArrowLeft:0, ArrowDown:0, ArrowRight:0 };
let pointer = { active: false, x: 200, y: 250 };

let enemies = [];
let bullets = [];
let particles = [];

// --- Input Handling ---
window.addEventListener('keydown', e => { if(keys[e.key] !== undefined) keys[e.key] = 1; });
window.addEventListener('keyup', e => { if(keys[e.key] !== undefined) keys[e.key] = 0; });

function handlePointer(e) {
  e.preventDefault();
  if (state !== 'PLAY' && (e.type === 'mousedown' || e.type === 'touchstart')) { 
    initGame(); return; 
  }
  let rect = cv.getBoundingClientRect();
  let touch = e.touches ? e.touches[0] : e;
  if(touch) {
    pointer.x = (touch.clientX - rect.left) * (cv.width / rect.width);
    pointer.y = (touch.clientY - rect.top) * (cv.height / rect.height);
  }
  pointer.active = e.type !== 'mouseup' && e.type !== 'touchend';
}
cv.addEventListener('mousedown', handlePointer);
cv.addEventListener('mousemove', e => { if(pointer.active) handlePointer(e); });
window.addEventListener('mouseup', handlePointer);
cv.addEventListener('touchstart', handlePointer, {passive: false});
cv.addEventListener('touchmove', handlePointer, {passive: false});
window.addEventListener('touchend', handlePointer);

function initGame() {
  px = 200; py = 250; 
  score = 0; frames = 0;
  timeScale = 0.05; targetTimeScale = 0.05;
  enemies = []; bullets = []; particles = [];
  state = 'PLAY';
  arcadeScoreSubmitted = false;
}

function queueChronoPulseScore(finalScore) {
  if (arcadeScoreSubmitted) return;
  arcadeScoreSubmitted = true;
  const s = Math.floor(Number(finalScore)) || 0;
  setTimeout(() => {
    import('/scores.js')
      .then(({ submitScore }) => {
        const raw = prompt('HIGH SCORE — Enter initials (max 12):', 'AAA');
        const name = raw == null ? 'AAA' : raw.trim() || 'AAA';
        submitScore({ gameId: 'neon-chrono-pulse', name, score: s, limit: 10 });
      })
      .catch(() => {});
  }, 0);
}

function gameOver() {
  if (state !== 'PLAY') return;
  state = 'OVER';
  queueChronoPulseScore(score);
}

function spawnParticle(x, y, color, count, speed = 2) {
  for(let i=0; i<count; i++) {
    particles.push({
      x, y, 
      vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed,
      life: 20 + Math.random()*20,
      maxLife: 40,
      color
    });
  }
}

// --- Game Loop ---
function update() {
  if (state !== 'PLAY') {
    if ((keys.w || keys.ArrowUp) && state === 'OVER') initGame();
    return;
  }
  
  frames++;

  // 1. Calculate Player Movement & Time Dilation
  let dx = 0, dy = 0;
  let isMoving = false;

  if (pointer.active) {
    let dist = Math.hypot(pointer.y - py, pointer.x - px);
    if (dist > 5) { 
      dx = (pointer.x - px) / dist; 
      dy = (pointer.y - py) / dist; 
      isMoving = true;
    }
  } else {
    if (keys.w || keys.ArrowUp) dy -= 1;
    if (keys.s || keys.ArrowDown) dy += 1;
    if (keys.a || keys.ArrowLeft) dx -= 1;
    if (keys.d || keys.ArrowRight) dx += 1;
    let dist = Math.hypot(dx, dy);
    if (dist > 0) { dx /= dist; dy /= dist; isMoving = true; }
  }

  // Time moves when you move
  targetTimeScale = isMoving ? 1.0 : 0.05;
  timeScale += (targetTimeScale - timeScale) * 0.2; // Smooth ramp up/down

  // Move Player (Independent of timeScale, so you feel responsive)
  px += dx * pSpeed; 
  py += dy * pSpeed;
  px = Math.max(10, Math.min(cv.width-10, px));
  py = Math.max(10, Math.min(cv.height-10, py));

  // 2. Player Auto-Fire (Affected by timeScale - you must move to reload!)
  pReload -= 1 * timeScale;
  if (pReload <= 0 && enemies.length > 0) {
    // Find nearest enemy
    let nearest = enemies.reduce((prev, curr) => {
      let d1 = Math.hypot(curr.y - py, curr.x - px);
      let d2 = Math.hypot(prev.y - py, prev.x - px);
      return d1 < d2 ? curr : prev;
    });
    
    let ang = Math.atan2(nearest.y - py, nearest.x - px);
    bullets.push({ 
      x: px, y: py, 
      vx: Math.cos(ang) * 12, vy: Math.sin(ang) * 12, 
      isPlayer: true, radius: 4 
    });
    spawnParticle(px, py, C_PBUL, 3, 1);
    pReload = 25; // Base reload frames
  }

  // 3. Spawning Enemies (Spawns faster as score increases)
  let spawnRate = Math.max(30, 100 - score * 2);
  if (frames * timeScale % spawnRate < timeScale) {
    let side = Math.floor(Math.random() * 4);
    let ex = side===0 ? -20 : side===1 ? cv.width+20 : Math.random()*cv.width;
    let ey = side===2 ? -20 : side===3 ? cv.height+20 : Math.random()*cv.height;
    enemies.push({ x: ex, y: ey, reload: 60 + Math.random()*40, radius: 8 });
  }

  // 4. Update Enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    let e = enemies[i];
    
    // Move towards player slowly
    let ang = Math.atan2(py - e.y, px - e.x);
    e.x += Math.cos(ang) * 1.2 * timeScale;
    e.y += Math.sin(ang) * 1.2 * timeScale;

    // Enemy Fire
    e.reload -= 1 * timeScale;
    if (e.reload <= 0) {
      bullets.push({ 
        x: e.x, y: e.y, 
        vx: Math.cos(ang) * 4.5, vy: Math.sin(ang) * 4.5, // Enemy bullets are fast!
        isPlayer: false, radius: 3 
      });
      e.reload = 80 + Math.random()*40;
    }

    // Hit Player? (Collision)
    if (Math.hypot(py - e.y, px - e.x) < 10 + e.radius) {
      spawnParticle(px, py, C_PLY, 30, 4);
      gameOver();
    }
  }

  // 5. Update Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    let b = bullets[i];
    b.x += b.vx * timeScale;
    b.y += b.vy * timeScale;

    // Out of bounds
    if (b.x < -20 || b.x > cv.width+20 || b.y < -20 || b.y > cv.height+20) {
      bullets.splice(i, 1);
      continue;
    }

    if (b.isPlayer) {
      // Check hit enemy
      for (let j = enemies.length - 1; j >= 0; j--) {
        let e = enemies[j];
        if (Math.hypot(b.y - e.y, b.x - e.x) < b.radius + e.radius + 2) {
          spawnParticle(e.x, e.y, C_ENM, 10, 3);
          enemies.splice(j, 1);
          bullets.splice(i, 1);
          score++;
          break;
        }
      }
    } else {
      // Check hit player
      if (Math.hypot(b.y - py, b.x - px) < b.radius + 6) {
        spawnParticle(px, py, C_PLY, 30, 4);
        gameOver();
      }
    }
  }

  // 6. Update Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx * timeScale; 
    p.y += p.vy * timeScale;
    p.life -= 1 * timeScale;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// --- Rendering ---
function draw() {
  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, cv.width, cv.height);

  // Background Grid (shifts with player movement to show time flow)
  ctx.strokeStyle = `rgba(0, 255, 255, ${0.05 + timeScale * 0.1})`;
  ctx.lineWidth = 1;
  let offsetX = -(px * 0.1) % 40;
  let offsetY = -(py * 0.1) % 40;
  for(let x=offsetX; x<cv.width; x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,cv.height); ctx.stroke(); }
  for(let y=offsetY; y<cv.height; y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(cv.width,y); ctx.stroke(); }

  ctx.lineJoin = 'round';

  // Draw Particles
  particles.forEach(p => {
    ctx.shadowColor = p.color; ctx.shadowBlur = 5;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillRect(p.x, p.y, 2, 2);
  });
  ctx.globalAlpha = 1;

  // Draw Enemies (Diamonds)
  enemies.forEach(e => {
    ctx.shadowColor = C_ENM; ctx.shadowBlur = 10;
    ctx.strokeStyle = C_ENM; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(e.x, e.y - e.radius);
    ctx.lineTo(e.x + e.radius, e.y);
    ctx.lineTo(e.x, e.y + e.radius);
    ctx.lineTo(e.x - e.radius, e.y);
    ctx.closePath(); ctx.stroke();
    // Core pulses with their reload time
    ctx.fillStyle = `rgba(255, 0, 60, ${1 - e.reload/100})`;
    ctx.fill();
  });

  // Draw Bullets
  bullets.forEach(b => {
    ctx.shadowColor = b.isPlayer ? C_PBUL : C_EBUL;
    ctx.shadowBlur = 8;
    ctx.fillStyle = b.isPlayer ? C_PBUL : C_EBUL;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fill();
    
    // Speed trail
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.arc(b.x - b.vx * 1.5, b.y - b.vy * 1.5, b.radius * 0.8, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1.0;
  });

  // Draw Player
  if (state !== 'TITLE' && state !== 'OVER') {
    ctx.shadowColor = C_PLY; ctx.shadowBlur = 15;
    ctx.strokeStyle = C_PLY; ctx.lineWidth = 2;
    
    // Draw a triangle pointing towards movement or mouse
    let ang = 0;
    if (pointer.active) {
      ang = Math.atan2(pointer.y - py, pointer.x - px);
    } else {
      ang = Math.atan2(py - cv.height/2, px - cv.width/2); // Default look
    }
    
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(ang);
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.lineTo(-6, 6);
    ctx.lineTo(-3, 0);
    ctx.lineTo(-6, -6);
    ctx.closePath();
    ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.restore();
  }

  // --- UI ---
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '10px "Press Start 2P"';
  
  if (state === 'PLAY') {
    ctx.fillText(`KILLS:${score}`, 10, 20);
    
    // Time Dilation Indicator
    ctx.textAlign = 'right';
    let pulseColor = timeScale > 0.5 ? C_ENM : C_PLY;
    ctx.fillStyle = pulseColor;
    ctx.fillText(timeScale > 0.5 ? 'TIME: FAST' : 'TIME: SLOW', cv.width - 10, 20);
    ctx.textAlign = 'left';

  } else if (state === 'TITLE') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,cv.width,cv.height);
    ctx.textAlign = 'center';
    ctx.shadowColor = C_PLY; ctx.shadowBlur = 20;
    ctx.fillStyle = C_PLY; ctx.font = '18px "Press Start 2P"';
    ctx.fillText('CHRONO-PULSE', cv.width/2, cv.height/2 - 40);
    
    ctx.shadowBlur = 0; ctx.font = '8px "Press Start 2P"';
    ctx.fillStyle = '#aaa';
    ctx.fillText('TIME ONLY MOVES', cv.width/2, cv.height/2 + 10);
    ctx.fillText('WHEN YOU MOVE', cv.width/2, cv.height/2 + 25);
    
    if (Math.floor(Date.now() / 500) % 2 === 0) {
      ctx.fillStyle = C_PBUL; ctx.font = '10px "Press Start 2P"';
      ctx.fillText('DRAG/WASD TO START', cv.width/2, cv.height - 50);
    }
    ctx.textAlign = 'left';
  } else if (state === 'OVER') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.textAlign = 'center';
    
    ctx.shadowColor = C_ENM; ctx.shadowBlur = 20;
    ctx.fillStyle = C_ENM; ctx.font = '24px "Press Start 2P"';
    ctx.fillText('SHATTERED', cv.width/2, cv.height/2 - 20);
    
    ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = '12px "Press Start 2P"';
    ctx.fillText(`KILLS: ${score}`, cv.width/2, cv.height/2 + 20);
    
    if (Math.floor(Date.now() / 500) % 2 === 0) {
      ctx.fillStyle = C_PLY; ctx.font = '10px "Press Start 2P"';
      ctx.fillText('TAP TO RETRY', cv.width/2, cv.height/2 + 60);
    }
    ctx.textAlign = 'left';
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Start Game Loop
loop();
</script>
</body>
</html>
