<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHRONO-PULSE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', monospace;
  }
  
  #cab {
    position: relative;
    border: 4px solid #222;
    border-radius: 10px;
    box-shadow: 
      0 0 40px rgba(0, 255, 255, 0.2),
      0 0 80px rgba(255, 0, 100, 0.1),
      inset 0 0 30px rgba(0, 0, 0, 0.9);
    background: #0a0a0a;
    padding: 8px;
  }
  
  #cv {
    display: block;
    border-radius: 5px;
    background: #02050a;
    cursor: crosshair;
  }
  
  #crt {
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border-radius: 5px;
    pointer-events: none;
    z-index: 10;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.15) 0px,
      rgba(0, 0, 0, 0.15) 1px,
      transparent 1px,
      transparent 2px
    );
  }
  
  #crt::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 5px;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 5, 20, 0.6) 100%);
  }
</style>
</head>
<body>

<div id="cab">
  <canvas id="cv" width="400" height="500"></canvas>
  <div id="crt"></div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// --- Aesthetics ---
const C_BG = '#02050a';
const C_PLY = '#00ffff';    // Cyan player
const C_ENM = '#ff003c';    // Red enemies
const C_PBUL = '#ffff00';   // Yellow player bullets
const C_EBUL = '#ff6600';   // Orange enemy bullets

// --- Game State ---
let state = 'TITLE'; // TITLE, PLAY, OVER
let frames = 0;
let score = 0;
let timeScale = 0.05; 
let targetTimeScale = 0.05;
let arcadeScoreSubmitted = false;

// Ship controls (Neon Rocks style): rotate + thrust + inertia
let keys = { w:0, a:0, s:0, d:0, ArrowUp:0, ArrowLeft:0, ArrowDown:0, ArrowRight:0 };
let keysFire = 0;
let firePressed = false;

const ship = {
  x: 200,
  y: 250,
  vx: 0,
  vy: 0,
  angle: -Math.PI / 2,
  rotSpeed: 0.075,
  thrust: 0.16,
  thrustOn: false,
};

let pReload = 0;
let aimAng = ship.angle;

let enemies = [];
let bullets = [];
let particles = [];
let obstacles = [];
const MAX_BOUNCES = 6;
const BULLET_SPD = 11;

// --- Input Handling ---
window.addEventListener('keydown', e => {
  if (keys[e.key] !== undefined) keys[e.key] = 1;
  if (e.code === 'Space') { e.preventDefault(); keysFire = 1; }
});
window.addEventListener('keyup', e => {
  if (keys[e.key] !== undefined) keys[e.key] = 0;
  if (e.code === 'Space') keysFire = 0;
});

function canvasCoords(clientX, clientY) {
  const rect = cv.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (cv.width / rect.width),
    y: (clientY - rect.top) * (cv.height / rect.height),
  };
}

// Mouse no longer aims; ship aims by rotation.

function handlePointer(e) {
  e.preventDefault();
  const rect = cv.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  const isTouch = e.type.startsWith('touch');

  if (state !== 'PLAY' && (e.type === 'mousedown' || e.type === 'touchstart')) {
    initGame();
    return;
  }

  if (state === 'PLAY') {
    if (e.type === 'mousedown' && e.button === 0) firePressed = true;
    if (e.type === 'touchstart') {
      const tx = (touch.clientX - rect.left) * (cv.width / rect.width);
      const inFireZone = tx > cv.width * 0.62;
      if (inFireZone) firePressed = true;
    }
  }

  void isTouch;
}
cv.addEventListener('mousedown', handlePointer);
window.addEventListener('mouseup', handlePointer);
cv.addEventListener('touchstart', handlePointer, { passive: false });
cv.addEventListener('touchmove', handlePointer, { passive: false });
window.addEventListener('touchend', handlePointer);

function initObstacles() {
  obstacles = [
    { x: 40, y: 100, w: 72, h: 14 },
    { x: 288, y: 100, w: 72, h: 14 },
    { x: 160, y: 200, w: 80, h: 14 },
    { x: 90, y: 320, w: 64, h: 14 },
    { x: 246, y: 320, w: 64, h: 14 },
    { x: 175, y: 420, w: 50, h: 14 },
  ];
}

function initGame() {
  ship.x = 200; ship.y = 250;
  ship.vx = 0; ship.vy = 0;
  ship.angle = -Math.PI / 2;
  ship.thrustOn = false;
  score = 0; frames = 0;
  timeScale = 0.05; targetTimeScale = 0.05;
  aimAng = ship.angle;
  enemies = []; bullets = []; particles = [];
  initObstacles();
  state = 'PLAY';
  arcadeScoreSubmitted = false;
}

function queueChronoPulseScore(finalScore) {
  if (arcadeScoreSubmitted) return;
  arcadeScoreSubmitted = true;
  const s = Math.floor(Number(finalScore)) || 0;
  setTimeout(() => {
    import('/scores.js')
      .then(({ submitScore }) => {
        const raw = prompt('HIGH SCORE — Enter initials (max 12):', 'AAA');
        const name = raw == null ? 'AAA' : raw.trim() || 'AAA';
        submitScore({ gameId: 'neon-chrono-pulse', name, score: s, limit: 10 });
      })
      .catch(() => {});
  }, 0);
}

function gameOver() {
  if (state !== 'PLAY') return;
  state = 'OVER';
  queueChronoPulseScore(score);
}

function spawnParticle(x, y, color, count, speed = 2) {
  for(let i=0; i<count; i++) {
    particles.push({
      x, y, 
      vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed,
      life: 20 + Math.random()*20,
      maxLife: 40,
      color
    });
  }
}

function bouncePlayerBulletOffObstacles(b) {
  for (const o of obstacles) {
    const cx = Math.max(o.x, Math.min(b.x, o.x + o.w));
    const cy = Math.max(o.y, Math.min(b.y, o.y + o.h));
    const dx = b.x - cx;
    const dy = b.y - cy;
    const d2 = dx * dx + dy * dy;
    if (d2 >= b.radius * b.radius) continue;
    if (b.bounces >= MAX_BOUNCES) {
      b.dead = true;
      return;
    }
    const d = Math.sqrt(d2) || 0.0001;
    b.bounces++;
    const nx = dx / d;
    const ny = dy / d;
    const pen = b.radius - d + 0.6;
    b.x += nx * pen;
    b.y += ny * pen;
    const dot = b.vx * nx + b.vy * ny;
    b.vx -= 2 * dot * nx;
    b.vy -= 2 * dot * ny;
    b.vx *= 0.98;
    b.vy *= 0.98;
    spawnParticle(b.x, b.y, '#88ffff', 4, 1.5);
    return;
  }
}

function spawnEnemyBurst() {
  if (enemies.length > 22) return;
  const ringR = 90 + Math.random() * 70;
  const n = 2 + (Math.random() * 3) | 0;
  for (let k = 0; k < n; k++) {
    const a = Math.random() * Math.PI * 2;
    enemies.push({
      x: ship.x + Math.cos(a) * ringR,
      y: ship.y + Math.sin(a) * ringR,
      reload: 55 + Math.random() * 35,
      radius: 8,
    });
  }
}

// --- Game Loop ---
function update() {
  if (state !== 'PLAY') {
    if (state === 'OVER' && (keys.w || keys.ArrowUp || keysFire)) initGame();
    return;
  }
  
  frames++;

  // 1. Ship rotate + thrust. Time moves when you commit.
  const rotLeft = keys.ArrowLeft || keys.a;
  const rotRight = keys.ArrowRight || keys.d;
  const thrustOn = keys.ArrowUp || keys.w;
  const brakeOn = keys.ArrowDown || keys.s;

  if (rotLeft) ship.angle -= ship.rotSpeed;
  if (rotRight) ship.angle += ship.rotSpeed;

  ship.thrustOn = !!thrustOn;
  if (ship.thrustOn) {
    ship.vx += Math.cos(ship.angle) * ship.thrust;
    ship.vy += Math.sin(ship.angle) * ship.thrust;
  }

  // Dampening + optional brake
  const brake = brakeOn ? 0.955 : 0.985;
  ship.vx *= brake;
  ship.vy *= brake;
  const spd = Math.hypot(ship.vx, ship.vy);
  const maxSpd = 6.3;
  if (spd > maxSpd) { ship.vx *= maxSpd / spd; ship.vy *= maxSpd / spd; }

  ship.x += ship.vx;
  ship.y += ship.vy;
  // Wrap (Asteroids feel)
  if (ship.x < -10) ship.x = cv.width + 10;
  if (ship.x > cv.width + 10) ship.x = -10;
  if (ship.y < -10) ship.y = cv.height + 10;
  if (ship.y > cv.height + 10) ship.y = -10;

  const isCommitting = ship.thrustOn || spd > 0.25 || rotLeft || rotRight;
  targetTimeScale = isCommitting ? 1.0 : 0.05;
  timeScale += (targetTimeScale - timeScale) * 0.2; // Smooth ramp up/down

  // Aim is ship facing
  aimAng = ship.angle;

  // 2. Manual fire — you choose where pulses go (Space / click / touch fire zone)
  pReload -= 1 * timeScale;
  const wantsFire = keysFire || firePressed;
  firePressed = false;
  if (wantsFire && pReload <= 0) {
    bullets.push({
      x: ship.x + Math.cos(aimAng) * 14,
      y: ship.y + Math.sin(aimAng) * 14,
      vx: Math.cos(aimAng) * BULLET_SPD,
      vy: Math.sin(aimAng) * BULLET_SPD,
      isPlayer: true,
      radius: 4,
      bounces: 0,
    });
    spawnParticle(ship.x, ship.y, C_PBUL, 3, 1);
    pReload = 18;
  }

  // 3. Spawning — more pressure over time; mix edge + ring spawns
  const diff = Math.min(1, frames / 7200);
  const spawnEvery = Math.max(16, 52 - score - diff * 40);
  if (frames % spawnEvery === 0) {
    const side = Math.floor(Math.random() * 4);
    const ex = side === 0 ? -20 : side === 1 ? cv.width + 20 : Math.random() * cv.width;
    const ey = side === 2 ? -20 : side === 3 ? cv.height + 20 : Math.random() * cv.height;
    enemies.push({ x: ex, y: ey, reload: 50 + Math.random() * 40, radius: 8 });
    if (Math.random() < 0.45 + diff * 0.35) {
      const s2 = Math.floor(Math.random() * 4);
      const ex2 = s2 === 0 ? -20 : s2 === 1 ? cv.width + 20 : Math.random() * cv.width;
      const ey2 = s2 === 2 ? -20 : s2 === 3 ? cv.height + 20 : Math.random() * cv.height;
      enemies.push({ x: ex2, y: ey2, reload: 55 + Math.random() * 40, radius: 8 });
    }
  }
  if (frames % 200 === 90 && enemies.length < Math.min(26, 12 + (score >> 1))) spawnEnemyBurst();

  // 4. Update Enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    let e = enemies[i];
    
    // Move towards player slowly
    let ang = Math.atan2(ship.y - e.y, ship.x - e.x);
    const esp = (1.35 + Math.min(0.5, score / 400)) * timeScale;
    e.x += Math.cos(ang) * esp;
    e.y += Math.sin(ang) * esp;

    // Enemy Fire
    e.reload -= 1 * timeScale;
    if (e.reload <= 0) {
      bullets.push({ 
        x: e.x, y: e.y, 
        vx: Math.cos(ang) * 4.5, vy: Math.sin(ang) * 4.5, // Enemy bullets are fast!
        isPlayer: false, radius: 3 
      });
      e.reload = 80 + Math.random()*40;
    }

    // Hit Player? (Collision)
    if (Math.hypot(ship.y - e.y, ship.x - e.x) < 10 + e.radius) {
      spawnParticle(ship.x, ship.y, C_PLY, 30, 4);
      gameOver();
    }
  }

  // 5. Update Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    let b = bullets[i];
    b.x += b.vx * timeScale;
    b.y += b.vy * timeScale;

    if (b.isPlayer) {
      bouncePlayerBulletOffObstacles(b);
      if (b.dead) {
        bullets.splice(i, 1);
        continue;
      }
    }

    if (b.x < -24 || b.x > cv.width + 24 || b.y < -24 || b.y > cv.height + 24) {
      bullets.splice(i, 1);
      continue;
    }

    if (b.isPlayer) {
      let hit = false;
      for (let j = enemies.length - 1; j >= 0; j--) {
        let e = enemies[j];
        if (Math.hypot(b.y - e.y, b.x - e.x) < b.radius + e.radius + 2) {
          spawnParticle(e.x, e.y, C_ENM, 10, 3);
          enemies.splice(j, 1);
          bullets.splice(i, 1);
          score++;
          hit = true;
          break;
        }
      }
      if (hit) continue;
    } else {
      if (Math.hypot(b.y - ship.y, b.x - ship.x) < b.radius + 6) {
        spawnParticle(ship.x, ship.y, C_PLY, 30, 4);
        gameOver();
      }
    }
  }

  // 6. Update Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx * timeScale; 
    p.y += p.vy * timeScale;
    p.life -= 1 * timeScale;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// --- Rendering ---
function draw() {
  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, cv.width, cv.height);

  // Background Grid (shifts with player movement to show time flow)
  ctx.strokeStyle = `rgba(0, 255, 255, ${0.05 + timeScale * 0.1})`;
  ctx.lineWidth = 1;
  let offsetX = -(px * 0.1) % 40;
  let offsetY = -(py * 0.1) % 40;
  for(let x=offsetX; x<cv.width; x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,cv.height); ctx.stroke(); }
  for(let y=offsetY; y<cv.height; y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(cv.width,y); ctx.stroke(); }

  ctx.lineJoin = 'round';

  obstacles.forEach(o => {
    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur = 10;
    ctx.strokeStyle = 'rgba(0,240,255,0.7)';
    ctx.lineWidth = 2;
    ctx.strokeRect(o.x, o.y, o.w, o.h);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(0,255,255,0.07)';
    ctx.fillRect(o.x, o.y, o.w, o.h);
  });

  // Draw Particles
  particles.forEach(p => {
    ctx.shadowColor = p.color; ctx.shadowBlur = 5;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillRect(p.x, p.y, 2, 2);
  });
  ctx.globalAlpha = 1;

  // Draw Enemies (Diamonds)
  enemies.forEach(e => {
    ctx.shadowColor = C_ENM; ctx.shadowBlur = 10;
    ctx.strokeStyle = C_ENM; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(e.x, e.y - e.radius);
    ctx.lineTo(e.x + e.radius, e.y);
    ctx.lineTo(e.x, e.y + e.radius);
    ctx.lineTo(e.x - e.radius, e.y);
    ctx.closePath(); ctx.stroke();
    // Core pulses with their reload time
    ctx.fillStyle = `rgba(255, 0, 60, ${1 - e.reload/100})`;
    ctx.fill();
  });

  // Draw Bullets
  bullets.forEach(b => {
    ctx.shadowColor = b.isPlayer ? C_PBUL : C_EBUL;
    ctx.shadowBlur = 8;
    ctx.fillStyle = b.isPlayer ? C_PBUL : C_EBUL;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fill();
    
    // Speed trail
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.arc(b.x - b.vx * 1.5, b.y - b.vy * 1.5, b.radius * 0.8, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1.0;
  });

  if (state === 'PLAY') {
    ctx.fillStyle = 'rgba(255,255,0,0.035)';
    ctx.fillRect(cv.width * 0.62, 0, cv.width * 0.38, cv.height);
    ctx.strokeStyle = 'rgba(255,255,0,0.4)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px + Math.cos(aimAng) * 62, py + Math.sin(aimAng) * 62);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Draw Player (ship)
  if (state !== 'TITLE' && state !== 'OVER') {
    ctx.shadowColor = C_PLY; ctx.shadowBlur = 15;
    ctx.strokeStyle = C_PLY; ctx.lineWidth = 2;
    
    ctx.save();
    ctx.translate(ship.x, ship.y);
    ctx.rotate(aimAng);
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.lineTo(-6, 6);
    ctx.lineTo(-3, 0);
    ctx.lineTo(-6, -6);
    ctx.closePath();
    ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.fill();
    if (ship.thrustOn) {
      ctx.shadowBlur = 0;
      ctx.strokeStyle = C_PBUL;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-6, 0);
      ctx.lineTo(-11 - Math.random() * 6, 0);
      ctx.stroke();
    }
    ctx.restore();
  }

  // --- UI ---
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '10px "Press Start 2P"';
  
  if (state === 'PLAY') {
    ctx.fillText(`KILLS:${score}`, 10, 20);
    ctx.fillStyle = '#778899';
    ctx.font = '7px "Press Start 2P"';
    ctx.fillText('SPACE / CLICK — FIRE', 10, cv.height - 10);
    ctx.font = '10px "Press Start 2P"';
    ctx.fillStyle = '#fff';
    
    // Time Dilation Indicator
    ctx.textAlign = 'right';
    let pulseColor = timeScale > 0.5 ? C_ENM : C_PLY;
    ctx.fillStyle = pulseColor;
    ctx.fillText(timeScale > 0.5 ? 'TIME: FAST' : 'TIME: SLOW', cv.width - 10, 20);
    ctx.textAlign = 'left';

  } else if (state === 'TITLE') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,cv.width,cv.height);
    ctx.textAlign = 'center';
    ctx.shadowColor = C_PLY; ctx.shadowBlur = 20;
    ctx.fillStyle = C_PLY; ctx.font = '18px "Press Start 2P"';
    ctx.fillText('CHRONO-PULSE', cv.width/2, cv.height/2 - 40);
    
    ctx.shadowBlur = 0; ctx.font = '8px "Press Start 2P"';
    ctx.fillStyle = '#aaa';
    ctx.fillText('TIME ONLY MOVES WHEN YOU MOVE', cv.width/2, cv.height/2 + 6);
    ctx.fillText('ROTATE: A/D OR ◀/▶', cv.width/2, cv.height/2 + 24);
    ctx.fillText('THRUST: W OR ▲ • BRAKE: S OR ▼', cv.width/2, cv.height/2 + 42);
    ctx.fillText('SPACE / CLICK TO FIRE', cv.width/2, cv.height/2 + 60);
    ctx.fillStyle = C_PBUL;
    ctx.fillText('PULSES RICOCHET OFF BARRIERS', cv.width/2, cv.height/2 + 78);
    ctx.fillStyle = '#8899aa';
    ctx.font = '7px "Press Start 2P"';
    ctx.fillText('TOUCH: TAP RIGHT ZONE TO FIRE', cv.width/2, cv.height/2 + 96);
    
    if (Math.floor(Date.now() / 500) % 2 === 0) {
      ctx.fillStyle = C_PBUL; ctx.font = '10px "Press Start 2P"';
      ctx.fillText('TAP / KEY TO START', cv.width/2, cv.height - 44);
    }
    ctx.textAlign = 'left';
  } else if (state === 'OVER') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.textAlign = 'center';
    
    ctx.shadowColor = C_ENM; ctx.shadowBlur = 20;
    ctx.fillStyle = C_ENM; ctx.font = '24px "Press Start 2P"';
    ctx.fillText('SHATTERED', cv.width/2, cv.height/2 - 20);
    
    ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = '12px "Press Start 2P"';
    ctx.fillText(`KILLS: ${score}`, cv.width/2, cv.height/2 + 20);
    
    if (Math.floor(Date.now() / 500) % 2 === 0) {
      ctx.fillStyle = C_PLY; ctx.font = '10px "Press Start 2P"';
      ctx.fillText('TAP TO RETRY', cv.width/2, cv.height/2 + 60);
    }
    ctx.textAlign = 'left';
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Start Game Loop
loop();
</script>
</body>
</html>
