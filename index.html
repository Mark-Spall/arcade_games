<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arcade Cabinet</title>
    <meta name="description" content="A tiny 90s-style arcade of single-file HTML games." />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="top">
      <div class="marquee" aria-hidden="true">
        <span>INSERT COIN • INSERT COIN • INSERT COIN • INSERT COIN • </span>
      </div>
      <div class="wrap">
        <div class="brand">
          <div class="badge" aria-hidden="true">90s</div>
          <div>
            <h1 class="title">ARCADE CABINET</h1>
            <p class="subtitle">Pick a game. Chase the high score.</p>
          </div>
        </div>
        <nav class="nav">
          <a class="btn btn-ghost" href="https://github.com/" target="_blank" rel="noreferrer">Source</a>
        </nav>
      </div>
    </header>

    <main class="wrap">
      <div class="columns">
        <section class="panel columns-panel">
          <div class="panel-head">
            <h2 class="panel-title">GAME SELECT</h2>
            <div class="panel-meta">
              <span id="gameCount" class="tag">Loading…</span>
              <span class="tag tag-warn">Global leaderboard</span>
            </div>
          </div>
          <div id="games" class="grid" aria-live="polite"></div>
        </section>

        <section class="panel columns-panel">
          <div class="panel-head">
            <h2 class="panel-title">HIGH SCORES</h2>
            <div class="panel-meta" style="gap:10px">
              <select id="hsGame" class="select" aria-label="Select game"></select>
              <button id="hsClear" class="btn btn-ghost" type="button">Clear</button>
              <a class="btn btn-ghost" href="/highscores.html">Full</a>
            </div>
          </div>
          <div style="padding: 4px 16px 16px">
            <table class="table" aria-label="High scores">
              <thead>
                <tr>
                  <th style="width: 70px">Rank</th>
                  <th>Name</th>
                  <th style="width: 120px">Score</th>
                  <th style="width: 180px">When</th>
                </tr>
              </thead>
              <tbody id="hsRows"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="/home.js"></script>
  </body>
</html>
